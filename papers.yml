  - cs.AI
  - cs.CV
- category: Ensembles
  title: 'GenCast: Diffusion-based ensemble forecasting for medium-range weather'
  authors: Ilan Price, Alvaro Sanchez-Gonzalez, Ferran Alet, Tom R. Andersson, Andrew
    El-Kadi, Dominic Masters, Timo Ewalds, Jacklynn Stott, Shakir Mohamed, Peter Battaglia,
    Remi Lam, Matthew Willson
  year: 2023
  arxiv: 2312.15796v2
  abstract: Weather forecasts are fundamentally uncertain, so predicting the range
    of probable weather scenarios is crucial for important decisions, from warning
    the public about hazardous weather, to planning renewable energy use. Here, we
    introduce GenCast, a probabilistic weather model with greater skill and speed
    than the top operational medium-range weather forecast in the world, the European
    Centre for Medium-Range Forecasts (ECMWF)'s ensemble forecast, ENS. Unlike traditional
    approaches, which are based on numerical weather prediction (NWP), GenCast is
    a machine learning weather prediction (MLWP) method, trained on decades of reanalysis
    data. GenCast generates an ensemble of stochastic 15-day global forecasts, at
    12-hour steps and 0.25 degree latitude-longitude resolution, for over 80 surface
    and atmospheric variables, in 8 minutes. It has greater skill than ENS on 97.4%
    of 1320 targets we evaluated, and better predicts extreme weather, tropical cyclones,
    and wind power production. This work helps open the next chapter in operational
    weather forecasting, where critical weather-dependent decisions are made with
    greater accuracy and efficiency.
  tags:
  - probabilistic
  - cs.LG
  - physics.ao-ph
  arxiv_categories:
  - cs.LG
  - physics.ao-ph
- category: Global Models
  title: 'Pangu-Weather: A 3D High-Resolution Model for Fast and Accurate Global Weather
    Forecast'
  authors: Kaifeng Bi, Lingxi Xie, Hengheng Zhang, Xin Chen, Xiaotao Gu, Qi Tian
  year: 2022
  arxiv: 2211.02556v1
  abstract: 'In this paper, we present Pangu-Weather, a deep learning based system
    for fast and accurate global weather forecast. For this purpose, we establish
    a data-driven environment by downloading $43$ years of hourly global weather data
    from the 5th generation of ECMWF reanalysis (ERA5) data and train a few deep neural
    networks with about $256$ million parameters in total. The spatial resolution
    of forecast is $0.25^\circ\times0.25^\circ$, comparable to the ECMWF Integrated
    Forecast Systems (IFS). More importantly, for the first time, an AI-based method
    outperforms state-of-the-art numerical weather prediction (NWP) methods in terms
    of accuracy (latitude-weighted RMSE and ACC) of all factors (e.g., geopotential,
    specific humidity, wind speed, temperature, etc.) and in all time ranges (from
    one hour to one week). There are two key strategies to improve the prediction
    accuracy: (i) designing a 3D Earth Specific Transformer (3DEST) architecture that
    formulates the height (pressure level) information into cubic data, and (ii) applying
    a hierarchical temporal aggregation algorithm to alleviate cumulative forecast
    errors. In deterministic forecast, Pangu-Weather shows great advantages for short
    to medium-range forecast (i.e., forecast time ranges from one hour to one week).
    Pangu-Weather supports a wide range of downstream forecast scenarios, including
    extreme weather forecast (e.g., tropical cyclone tracking) and large-member ensemble
    forecast in real-time. Pangu-Weather not only ends the debate on whether AI-based
    methods can surpass conventional NWP methods, but also reveals novel directions
    for improving deep learning weather forecast systems.'
  tags:
