- category: Data Assimilation
  title: Comparing Data Assimilation and Likelihood-Based Inference on Latent State
    Estimation in Agent-Based Models
  authors: Blas Kolic, Corrado Monti, Gianmarco De Francisci Morales, Marco Pangallo
  year: 2025
  arxiv: 2509.17625v1
  abstract: In this paper, we present the first systematic comparison of Data Assimilation
    (DA) and Likelihood-Based Inference (LBI) in the context of Agent-Based Models
    (ABMs). These models generate observable time series driven by evolving, partially-latent
    microstates. Latent states need to be estimated to align simulations with real-world
    data -- a task traditionally addressed by DA, especially in continuous and equation-based
    models such as those used in weather forecasting. However, the nature of ABMs
    poses challenges for standard DA methods. Solving such issues requires adaptation
    of previous DA techniques, or ad-hoc alternatives such as LBI. DA approximates
    the likelihood in a model-agnostic way, making it broadly applicable but potentially
    less precise. In contrast, LBI provides more accurate state estimation by directly
    leveraging the model's likelihood, but at the cost of requiring a hand-crafted,
    model-specific likelihood function, which may be complex or infeasible to derive.
    We compare the two methods on the Bounded-Confidence Model, a well-known opinion
    dynamics ABM, where agents are affected only by others holding sufficiently similar
    opinions. We find that LBI better recovers latent agent-level opinions, even under
    model mis-specification, leading to improved individual-level forecasts. At the
    aggregate level, however, both methods perform comparably, and DA remains competitive
    across levels of aggregation under certain parameter settings. Our findings suggest
    that DA is well-suited for aggregate predictions, while LBI is preferable for
    agent-level inference.
  tags: []
- category: Climate Modeling
  title: Disrespect Others, Respect the Climate? Applying Social Dynamics with Inequality
    to Forest Climate Models
  authors: Luke Wisniewski, Thomas Zdyrski, Feng Fu
  year: 2025
  arxiv: 2509.17252v1
  abstract: Understanding the role of human behavior in shaping environmental outcomes
    is crucial for addressing global challenges such as climate change. Environmental
    systems are influenced not only by natural factors like temperature, but also
    by human decisions regarding mitigation efforts, which are often based on forecasts
    or predictions about future environmental conditions. Over time, different outcomes
    can emerge, including scenarios where the environment deteriorates despite efforts
    to mitigate, or where successful mitigation leads to environmental resilience.
    Additionally, fluctuations in the level of human participation in mitigation can
    occur, reflecting shifts in collective behavior. In this study, we consider a
    variety of human mitigation decisions, in addition to the feedback loop that is
    created by changes in human behavior because of environmental changes. While these
    outcomes are based on simplified models, they offer important insights into the
    dynamics of human decision-making and the factors that influence effective action
    in the context of environmental sustainability. This study aims to examine key
    social dynamics influencing society's response to a worsening climate. While others
    conclude that homophily prompts greater warming unconditionally, this model finds
    that homophily can prevent catastrophic effects given a poor initial environmental
    state. Assuming that poor countries have the resources to do so, a consensus in
    that class group to defect from the strategy of the rich group (who are generally
    incentivized to continue ``business as usual'') can frequently prevent the vegetation
    proportion from converging to 0.
  tags: []
- category: Nowcasting
  title: Probability calibration for precipitation nowcasting
  authors: Lauri Kurki, Yaniel Cabrera, Samu Karanko
  year: 2025
  arxiv: 2510.00594v1
  abstract: Reliable precipitation nowcasting is critical for weather-sensitive decision-making,
    yet neural weather models (NWMs) can produce poorly calibrated probabilistic forecasts.
    Standard calibration metrics such as the expected calibration error (ECE) fail
    to capture miscalibration across precipitation thresholds. We introduce the expected
    thresholded calibration error (ETCE), a new metric that better captures miscalibration
    in ordered classes like precipitation amounts. We extend post-processing techniques
    from computer vision to the forecasting domain. Our results show that selective
    scaling with lead time conditioning reduces model miscalibration without reducing
    the forecast quality.
  tags:
  - probabilistic
- category: Data Assimilation
  title: 'On the joint observability of flow fields and particle properties from Lagrangian
    trajectories: evidence from neural data assimilation'
  authors: Ke Zhou, Samuel J. Grauer
  year: 2025
  arxiv: 2510.00479v1
  abstract: We numerically investigate the joint observability of flow states and
    unknown particle properties from Lagrangian particle tracking (LPT) data. LPT
    offers time-resolved, volumetric measurements of particle trajectories, but experimental
    tracks are spatially sparse, potentially noisy, and may be further complicated
    by inertial transport, raising the question of whether both Eulerian fields and
    particle characteristics can be reliably inferred. To address this, we develop
    a data assimilation framework that couples an Eulerian flow representation with
    Lagrangian particle models, enabling the simultaneous inference of carrier fields
    and particle properties under the governing equations of disperse multiphase flow.
    Using this approach, we establish empirical existence proofs of joint observability
    across three representative regimes. In a turbulent boundary layer with noisy
    tracer tracks (St to 0), flow states and true particle positions are jointly observable.
    In homogeneous isotropic turbulence seeded with inertial particles (St ~ 1-5),
    we demonstrate simultaneous recovery of flow states and particle diameters, showing
    the feasibility of implicit particle characterization. In a compressible, shock-dominated
    flow, we report the first joint reconstructions of velocity, pressure, density,
    and inertial particle properties (diameter and density), highlighting both the
    potential and certain limits of observability in supersonic regimes. Systematic
    sensitivity studies further reveal how seeding density, noise level, and Stokes
    number govern reconstruction accuracy, yielding practical guidelines for experimental
    design. Taken together, these results show that the scope of LPT could be broadened
    to multiphase and high-speed flows, in which tracer and measurement fidelity are
    limited.
  tags: []
- category: Climate Modeling
  title: 'EnScale: Temporally-consistent multivariate generative downscaling via proper
    scoring rules'
  authors: Maybritt Schillinger, Maxim Samarin, Xinwei Shen, Reto Knutti, Nicolai
    Meinshausen
  year: 2025
  arxiv: 2509.26258v1
  abstract: The practical use of future climate projections from global circulation
    models (GCMs) is often limited by their coarse spatial resolution, requiring downscaling
    to generate high-resolution data. Regional climate models (RCMs) provide this
    refinement, but are computationally expensive. To address this issue, machine
    learning models can learn the downscaling function, mapping coarse GCM outputs
    to high-resolution fields. Among these, generative approaches aim to capture the
    full conditional distribution of RCM data given coarse-scale GCM data, which is
    characterized by large variability and thus challenging to model accurately. We
    introduce EnScale, a generative machine learning framework that emulates the full
    GCM-to-RCM map by training on multiple pairs of GCM and corresponding RCM data.
    It first adjusts large-scale mismatches between GCM and coarsened RCM data, followed
    by a super-resolution step to generate high-resolution fields. Both steps employ
    generative models optimized with the energy score, a proper scoring rule. Compared
    to state-of-the-art ML downscaling approaches, our setup reduces computational
    cost by about one order of magnitude. EnScale jointly emulates multiple variables
    -- temperature, precipitation, solar radiation, and wind -- spatially consistent
    over an area in Central Europe. In addition, we propose a variant EnScale-t that
    enables temporally consistent downscaling. We establish a comprehensive evaluation
    framework across various categories including calibration, spatial structure,
    extremes, and multivariate dependencies. Comparison with diverse benchmarks demonstrates
    EnScale's strong performance and computational efficiency. EnScale offers a promising
    approach for accurate and temporally consistent RCM emulation.
  tags: []
- category: Ensembles
  title: 'Swift: An Autoregressive Consistency Model for Efficient Weather Forecasting'
  authors: Jason Stock, Troy Arcomano, Rao Kotamarthi
  year: 2025
  arxiv: 2509.25631v1
  abstract: Diffusion models offer a physically grounded framework for probabilistic
    weather forecasting, but their typical reliance on slow, iterative solvers during
    inference makes them impractical for subseasonal-to-seasonal (S2S) applications
    where long lead-times and domain-driven calibration are essential. To address
    this, we introduce Swift, a single-step consistency model that, for the first
    time, enables autoregressive finetuning of a probability flow model with a continuous
    ranked probability score (CRPS) objective. This eliminates the need for multi-model
    ensembling or parameter perturbations. Results show that Swift produces skillful
    6-hourly forecasts that remain stable for up to 75 days, running $39\times$ faster
    than state-of-the-art diffusion baselines while achieving forecast skill competitive
    with the numerical-based, operational IFS ENS. This marks a step toward efficient
    and reliable ensemble forecasting from medium-range to seasonal-scales.
  tags:
  - diffusion
  - probabilistic
- category: Climate Modeling
  title: 'The Open-Source Photochem Code: A General Chemical and Climate Model for
    Interpreting (Exo)Planet Observations'
  authors: Nicholas F. Wogan, Natasha E. Batalha, Kevin Zahnle, Joshua Krissansen-Totton,
    David C. Catling, Eric T. Wolf, Tyler D. Robinson, Victoria Meadows, Giada Arney,
    Shawn Domagal-Goldman
  year: 2025
  arxiv: 2509.25578v1
  abstract: With the launch of the James Webb Space Telescope, we are firmly in the
    era of exoplanet atmosphere characterization. Understanding exoplanet spectra
    requires atmospheric chemical and climate models that span the diversity of planetary
    atmospheres. Here, we present a more general chemical and climate model of planetary
    atmospheres. Specifically, we introduce the open-source, one-dimensional photochemical
    and climate code Photochem, and benchmark the model against the observed compositions
    and climates of Venus, Earth, Mars, Jupiter and Titan with a single set of kinetics,
    thermodynamics and opacities. We also model the chemistry of the hot Jupiter exoplanet
    WASP-39b. All simulations are open-source and reproducible. To first order, Photochem
    broadly reproduces the gas-phase chemistry and pressure-temperature profiles of
    all six planets. The largest model-data discrepancies are found in Venus's sulfur
    chemistry, motivating future experimental work on sulfur kinetics and spacecraft
    missions to Venus. We also find that clouds and hazes are important for the energy
    balance of Venus, Earth, Mars and Titan, and that accurately predicting aerosols
    with Photochem is challenging. Finally, we benchmark Photochem against the popular
    VULCAN and HELIOS photochemistry and climate models, finding excellent agreement
    for the same inputs; we also find that Photochem simulates atmospheres 2 to 100
    time more efficiently. These results show that Photochem provides a comparatively
    general description of atmospheric chemistry and physics that can be leveraged
    to study Solar System worlds or interpret telescope observations of exoplanets.
  tags: []
- category: Climate Modeling
  title: 'Beyond the Training Data: Confidence-Guided Mixing of Parameterizations
    in a Hybrid AI-Climate Model'
  authors: Helge Heuer, Tom Beucler, Mierk Schwabe, Julien Savre, Manuel Schlund,
    Veronika Eyring
  year: 2025
  arxiv: 2510.08107v1
  abstract: Persistent systematic errors in Earth system models (ESMs) arise from
    difficulties in representing the full diversity of subgrid, multiscale atmospheric
    convection and turbulence. Machine learning (ML) parameterizations trained on
    short high-resolution simulations show strong potential to reduce these errors.
    However, stable long-term atmospheric simulations with hybrid (physics + ML) ESMs
    remain difficult, as neural networks (NNs) trained offline often destabilize online
    runs. Training convection parameterizations directly on coarse-grained data is
    challenging, notably because scales cannot be cleanly separated. This issue is
    mitigated using data from superparameterized simulations, which provide clearer
    scale separation. Yet, transferring a parameterization from one ESM to another
    remains difficult due to distribution shifts that induce large inference errors.
    Here, we present a proof-of-concept where a ClimSim-trained, physics-informed
    NN convection parameterization is successfully transferred to ICON-A. The scheme
    is (a) trained on adjusted ClimSim data with subtracted radiative tendencies,
    and (b) integrated into ICON-A. The NN parameterization predicts its own error,
    enabling mixing with a conventional convection scheme when confidence is low,
    thus making the hybrid AI-physics model tunable with respect to observations and
    reanalysis through mixing parameters. This improves process understanding by constraining
    convective tendencies across column water vapor, lower-tropospheric stability,
    and geographical conditions, yielding interpretable regime behavior. In AMIP-style
    setups, several hybrid configurations outperform the default convection scheme
    (e.g., improved precipitation statistics). With additive input noise during training,
    both hybrid and pure-ML schemes lead to stable simulations and remain physically
    consistent for at least 20 years.
  tags:
  - physics-informed
- category: Nowcasting
  title: 'SimCast: Enhancing Precipitation Nowcasting with Short-to-Long Term Knowledge
    Distillation'
  authors: Yifang Yin, Shengkai Chen, Yiyao Li, Lu Wang, Ruibing Jin, Wei Cui, Shili
    Xiang
  year: 2025
  arxiv: 2510.07953v1
  abstract: Precipitation nowcasting predicts future radar sequences based on current
    observations, which is a highly challenging task driven by the inherent complexity
    of the Earth system. Accurate nowcasting is of utmost importance for addressing
    various societal needs, including disaster management, agriculture, transportation,
    and energy optimization. As a complementary to existing non-autoregressive nowcasting
    approaches, we investigate the impact of prediction horizons on nowcasting models
    and propose SimCast, a novel training pipeline featuring a short-to-long term
    knowledge distillation technique coupled with a weighted MSE loss to prioritize
    heavy rainfall regions. Improved nowcasting predictions can be obtained without
    introducing additional overhead during inference. As SimCast generates deterministic
    predictions, we further integrate it into a diffusion-based framework named CasCast,
    leveraging the strengths from probabilistic models to overcome limitations such
    as blurriness and distribution shift in deterministic outputs. Extensive experimental
    results on three benchmark datasets validate the effectiveness of the proposed
    framework, achieving mean CSI scores of 0.452 on SEVIR, 0.474 on HKO-7, and 0.361
    on MeteoNet, which outperforms existing approaches by a significant margin.
  tags:
  - probabilistic
- category: Other
  title: Road Surface Condition Detection with Machine Learning using New York State
    Department of Transportation Camera Images and Weather Forecast Data
  authors: Carly Sutter, Kara J. Sulia, Nick P. Bassill, Christopher D. Wirz, Christopher
    D. Thorncroft, Jay C. Rothenberger, Vanessa Przybylo, Mariana G. Cains, Jacob
    Radford, David Aaron Evans
  year: 2025
  arxiv: 2510.06440v1
  abstract: 'The New York State Department of Transportation (NYSDOT) has a network
    of roadside traffic cameras that are used by both the NYSDOT and the public to
    observe road conditions. The NYSDOT evaluates road conditions by driving on roads
    and observing live cameras, tasks which are labor-intensive but necessary for
    making critical operational decisions during winter weather events. However, machine
    learning models can provide additional support for the NYSDOT by automatically
    classifying current road conditions across the state. In this study, convolutional
    neural networks and random forests are trained on camera images and weather data
    to predict road surface conditions. Models are trained on a hand-labeled dataset
    of ~22,000 camera images, each classified by human labelers into one of six road
    surface conditions: severe snow, snow, wet, dry, poor visibility, or obstructed.
    Model generalizability is prioritized to meet the operational needs of the NYSDOT
    decision makers, and the weather-related road surface condition model in this
    study achieves an accuracy of 81.5% on completely unseen cameras.'
  tags:
  - CNN
- category: Climate Modeling
  title: Climate Model Tuning with Online Synchronization-Based Parameter Estimation
  authors: Jordan Seneca, Suzanne Bintanja, Frank M. Selten
  year: 2025
  arxiv: 2510.06180v1
  abstract: In climate science, the tuning of climate models is a computationally
    intensive problem due to the combination of the high-dimensionality of the system
    state and long integration times. Here we demonstrate the potential of a parameter
    estimation algorithm which makes use of synchronization to tune a global atmospheric
    model at modest computational costs. We first use it to directly optimize internal
    model parameters. We then apply the algorithm to the weights of each member of
    a supermodel ensemble to optimize the overall predictions. In both cases, the
    algorithm is able to find parameters which result in reduced errors in the climatology
    of the model. Finally, we introduce a novel approach which combines both methods
    called adaptive supermodeling, where the internal parameters of the members of
    a supermodel are tuned simultaneously with the model weights such that the supermodel
    predictions are optimized. For a case designed to challenge the two previous methods,
    adaptive supermodeling achieves a performance similar to a perfect model.
  tags: []
- category: Data Assimilation
  title: Incorporating Multivariate Consistency in ML-Based Weather Forecasting with
    Latent-space Constraints
  authors: Hang Fan, Yi Xiao, Yongquan Qu, Fenghua Ling, Ben Fei, Lei Bai, Pierre
    Gentine
  year: 2025
  arxiv: 2510.04006v1
  abstract: Data-driven machine learning (ML) models have recently shown promise in
    surpassing traditional physics-based approaches for weather forecasting, leading
    to a so-called second revolution in weather forecasting. However, most ML-based
    forecast models treat reanalysis as the truth and are trained under variable-specific
    loss weighting, ignoring their physical coupling and spatial structure. Over long
    time horizons, the forecasts become blurry and physically unrealistic under rollout
    training. To address this, we reinterpret model training as a weak-constraint
    four-dimensional variational data assimilation (WC-4DVar) problem, treating reanalysis
    data as imperfect observations. This allows the loss function to incorporate reanalysis
    error covariance and capture multivariate dependencies. In practice, we compute
    the loss in a latent space learned by an autoencoder (AE), where the reanalysis
    error covariance becomes approximately diagonal, thus avoiding the need to explicitly
    model it in the high-dimensional model space. We show that rollout training with
    latent-space constraints improves long-term forecast skill and better preserves
    fine-scale structures and physical realism compared to training with model-space
    loss. Finally, we extend this framework to accommodate heterogeneous data sources,
    enabling the forecast model to be trained jointly on reanalysis and multi-source
    observations within a unified theoretical formulation.
  tags:
  - physics-informed
- category: Nowcasting
  title: 'RainDiff: End-to-end Precipitation Nowcasting Via Token-wise Attention Diffusion'
  authors: Thao Nguyen, Jiaqi Ma, Fahad Shahbaz Khan, Souhaib Ben Taieb, Salman Khan
  year: 2025
  arxiv: 2510.14962v1
  abstract: 'Precipitation nowcasting, predicting future radar echo sequences from
    current observations, is a critical yet challenging task due to the inherently
    chaotic and tightly coupled spatio-temporal dynamics of the atmosphere. While
    recent advances in diffusion-based models attempt to capture both large-scale
    motion and fine-grained stochastic variability, they often suffer from scalability
    issues: latent-space approaches require a separately trained autoencoder, adding
    complexity and limiting generalization, while pixel-space approaches are computationally
    intensive and often omit attention mechanisms, reducing their ability to model
    long-range spatio-temporal dependencies. To address these limitations, we propose
    a Token-wise Attention integrated into not only the U-Net diffusion model but
    also the spatio-temporal encoder that dynamically captures multi-scale spatial
    interactions and temporal evolution. Unlike prior approaches, our method natively
    integrates attention into the architecture without incurring the high resource
    cost typical of pixel-space diffusion, thereby eliminating the need for separate
    latent modules. Our extensive experiments and visual evaluations across diverse
    datasets demonstrate that the proposed method significantly outperforms state-of-the-art
    approaches, yielding superior local fidelity, generalization, and robustness in
    complex precipitation forecasting scenarios.'
  tags:
  - transformer
  - diffusion
  - CNN
- category: Downscaling
  title: Assessing the Geographic Generalization and Physical Consistency of Generative
    Models for Climate Downscaling
  authors: Carlo Saccardi, Maximilian Pierzyna, Haitz Sáez de Ocáriz Borde, Simone
    Monaco, Cristian Meo, Pietro Liò, Rudolf Saathof, Geethu Joseph, Justin Dauwels
  year: 2025
  arxiv: 2510.13722v1
  abstract: 'Kilometer-scale weather data is crucial for real-world applications but
    remains computationally intensive to produce using traditional weather simulations.
    An emerging solution is to use deep learning models, which offer a faster alternative
    for climate downscaling. However, their reliability is still in question, as they
    are often evaluated using standard machine learning metrics rather than insights
    from atmospheric and weather physics. This paper benchmarks recent state-of-the-art
    deep learning models and introduces physics-inspired diagnostics to evaluate their
    performance and reliability, with a particular focus on geographic generalization
    and physical consistency. Our experiments show that, despite the seemingly strong
    performance of models such as CorrDiff, when trained on a limited set of European
    geographies (e.g., central Europe), they struggle to generalize to other regions
    such as Iberia, Morocco in the south, or Scandinavia in the north. They also fail
    to accurately capture second-order variables such as divergence and vorticity
    derived from predicted velocity fields. These deficiencies appear even in in-distribution
    geographies, indicating challenges in producing physically consistent predictions.
    We propose a simple initial solution: introducing a power spectral density loss
    function that empirically improves geographic generalization by encouraging the
    reconstruction of small-scale physical structures. The code for reproducing the
    experimental results can be found at https://github.com/CarloSaccardi/PSD-Downscaling'
  tags: []
  github: https://github.com/CarloSaccardi/PSD-Downscaling
- category: Climate Modeling
  title: 'Specification and Verification for Climate Modeling: Formalization Leading
    to Impactful Tooling'
  authors: Alper Altuntas, Allison H. Baker, John Baugh, Ganesh Gopalakrishnan, Stephen
    F. Siegel
  year: 2025
  arxiv: 2510.13425v1
  abstract: Earth System Models (ESMs) are critical for understanding past climates
    and projecting future scenarios. However, the complexity of these models, which
    include large code bases, a wide community of developers, and diverse computational
    platforms, poses significant challenges for software quality assurance. The increasing
    adoption of GPUs and heterogeneous architectures further complicates verification
    efforts. Traditional verification methods often rely on bitwise reproducibility,
    which is not always feasible, particularly under new compilers or hardware. Manual
    expert evaluation, on the other hand, is subjective and time-consuming. Formal
    methods offer a mathematically rigorous alternative, yet their application in
    ESM development has been limited due to the lack of climate model-specific representations
    and tools. Here, we advocate for the broader adoption of formal methods in climate
    modeling. In particular, we identify key aspects of ESMs that are well suited
    to formal specification and introduce abstraction approaches for a tailored framework.
    To demonstrate this approach, we present a case study using CIVL model checker
    to formally verify a bug fix in an ocean mixing parameterization scheme. Our goal
    is to develop accessible, domain-specific formal tools that enhance model confidence
    and support more efficient and reliable ESM development.
  tags: []
- category: Downscaling
  title: Km-scale dynamical downscaling through conformalized latent diffusion models
  authors: Alessandro Brusaferri, Andrea Ballarino
  year: 2025
  arxiv: 2510.13301v1
  abstract: Dynamical downscaling is crucial for deriving high-resolution meteorological
    fields from coarse-scale simulations, enabling detailed analysis for critical
    applications such as weather forecasting and renewable energy modeling. Generative
    Diffusion models (DMs) have recently emerged as powerful data-driven tools for
    this task, offering reconstruction fidelity and more scalable sampling supporting
    uncertainty quantification. However, DMs lack finite-sample guarantees against
    overconfident predictions, resulting in miscalibrated grid-point-level uncertainty
    estimates hindering their reliability in operational contexts. In this work, we
    tackle this issue by augmenting the downscaling pipeline with a conformal prediction
    framework. Specifically, the DM's samples are post-processed to derive conditional
    quantile estimates, incorporated into a conformalized quantile regression procedure
    targeting locally adaptive prediction intervals with finite-sample marginal validity.
    The proposed approach is evaluated on ERA5 reanalysis data over Italy, downscaled
    to a 2-km grid. Results demonstrate grid-point-level uncertainty estimates with
    markedly improved coverage and stable probabilistic scores relative to the DM
    baseline, highlighting the potential of conformalized generative models for more
    trustworthy probabilistic downscaling to high-resolution meteorological fields.
  tags:
  - diffusion
  - probabilistic
- category: Climate Modeling
  title: A Stochastic Parameterization of Non-Orographic Gravity Waves Induced Mixing
    for Mars Planetary Climate Model
  authors: Jiandong Liu, Ehouarn Millour, François Forget, François Lott, Jean-Yves
    Chaufray
  year: 2025
  arxiv: 2510.20410v1
  abstract: This paper presents a formalism of mixing induced by non-orographic gravity
    waves (GWs) to integrate with the stochastic GWs scheme in the Mars Planetary
    Climate Model. We derive the formalism of GWs and their mixing under the same
    assumptions, integrating the two schemes within a unified framework. Specifically,
    a surface-to-exosphere parameterization of GW-induced turbulence has been derived
    in terms of the eddy diffusion coefficient. Simulations show that the coefficient
    is on the order of 1E4 to 1E9 cm2 s-1 and a turbopause is at altitudes of 70 to
    140 km, varying with seasons. The triggered mixing has minor effects on model
    temperatures, yet it substantially impacts upper atmospheric abundances. Simulations
    are consistent with observations from the Mars Climate Sounder and the Neutral
    Gas and Ion Mass Spectrometer. Mixing enhances the tracer transports in the middle
    and upper atmosphere, governing the dynamics of these regions. The scheme reveals
    how non-orographic GW-induced turbulence can regulate upper atmospheric processes,
    such as tracer escape.
  tags: []
- category: Data Assimilation
  title: Continuous data assimilation applied to the Rayleigh-Benard problem for compressible
    fluid flows
  authors: Eduard Feireisl, Wladimir Neves
  year: 2025
  arxiv: 2510.20316v1
  abstract: We apply a continuous data assimilation method to the Navier-Stokes-Fourier
    system governing the evolution of a compressible, rotating and thermally driven
    fluid. A rigorous proof of the tracking property is given in the asymptotic regime
    of low Mach and high Rossby and Froude numbers. Large data in the framework of
    weak solutions are considered.
  tags: []
- category: Downscaling
  title: Sparse Local Implicit Image Function for sub-km Weather Downscaling
  authors: Yago del Valle Inclan Redondo, Enrique Arriaga-Varela, Dmitry Lyamzin,
    Pablo Cervantes, Tiago Ramalho
  year: 2025
  arxiv: 2510.20228v1
  abstract: We introduce SpLIIF to generate implicit neural representations and enable
    arbitrary downscaling of weather variables. We train a model from sparse weather
    stations and topography over Japan and evaluate in- and out-of-distribution accuracy
    predicting temperature and wind, comparing it to both an interpolation baseline
    and CorrDiff. We find the model to be up to 50% better than both CorrDiff and
    the baseline at downscaling temperature, and around 10-20% better for wind.
  tags: []
- category: Data Assimilation
  title: Non-intrusive structural-preserving sequential data assimilation
  authors: Lizuo Liu, Tongtong Li, Anne Gelb
  year: 2025
  arxiv: 2510.19701v1
  abstract: Data assimilation (DA) methods combine model predictions with observational
    data to improve state estimation in dynamical systems, inspiring their increasingly
    prominent role in geophysical and climate applications. Classical DA methods assume
    that the governing equations modeling the dynamics are known, which is unlikely
    for most real world applications. Machine learning (ML) provides a flexible alternative
    by learning surrogate models directly from data, but standard ML methods struggle
    in noisy and data-scarce environments, where meaningful extrapolation requires
    incorporating physical constraints. Recent advances in structure-preserving ML
    architectures, such as the development of the entropy-stable conservative flux
    form network (ESCFN), highlight the critical role of physical structure in improving
    learning stability and accuracy for unknown systems of conservation laws. Structural
    information has also been shown to improve DA performance. Gradient-based measures
    of spatial variability, in particular, can help refine ensemble updates in discontinuous
    systems. Motivated by both of these recent innovations, this investigation proposes
    a new non-intrusive, structure-preserving sequential data assimilation (NSSDA)
    framework that leverages structure at both the forecast and analysis stages. We
    use the ESCFN to construct a surrogate model to preserve physical laws during
    forecasting, and a structurally informed ensemble transform Kalman filter (SETKF)
    to embed local statistical structure into the assimilation step. Our method operates
    in a highly constrained environment, using only a single noisy trajectory for
    both training and assimilation. Numerical experiments where the unknown dynamics
    correspond respectively to the shallow water and Euler equations demonstrate significantly
    improved predictive accuracy.
  tags: []
- category: Climate Modeling
  title: 'OmniCast: A Masked Latent Diffusion Model for Weather Forecasting Across
    Time Scales'
  authors: Tung Nguyen, Tuan Pham, Troy Arcomano, Veerabhadra Kotamarthi, Ian Foster,
    Sandeep Madireddy, Aditya Grover
  year: 2025
  arxiv: 2510.18707v1
  abstract: 'Accurate weather forecasting across time scales is critical for anticipating
    and mitigating the impacts of climate change. Recent data-driven methods based
    on deep learning have achieved significant success in the medium range, but struggle
    at longer subseasonal-to-seasonal (S2S) horizons due to error accumulation in
    their autoregressive approach. In this work, we propose OmniCast, a scalable and
    skillful probabilistic model that unifies weather forecasting across timescales.
    OmniCast consists of two components: a VAE model that encodes raw weather data
    into a continuous, lower-dimensional latent space, and a diffusion-based transformer
    model that generates a sequence of future latent tokens given the initial conditioning
    tokens. During training, we mask random future tokens and train the transformer
    to estimate their distribution given conditioning and visible tokens using a per-token
    diffusion head. During inference, the transformer generates the full sequence
    of future tokens by iteratively unmasking random subsets of tokens. This joint
    sampling across space and time mitigates compounding errors from autoregressive
    approaches. The low-dimensional latent space enables modeling long sequences of
    future latent states, allowing the transformer to learn weather dynamics beyond
    initial conditions. OmniCast performs competitively with leading probabilistic
    methods at the medium-range timescale while being 10x to 20x faster, and achieves
    state-of-the-art performance at the subseasonal-to-seasonal scale across accuracy,
    physics-based, and probabilistic metrics. Furthermore, we demonstrate that OmniCast
    can generate stable rollouts up to 100 years ahead. Code and model checkpoints
    are available at https://github.com/tung-nd/omnicast.'
  tags:
  - transformer
  - diffusion
  - physics-informed
  - variational
  - probabilistic
  github: https://github.com/tung-nd/omnicast
- category: Global Models
  title: 'COBASE: A new copula-based shuffling method for ensemble weather forecast
    postprocessing'
  authors: Maurits Flos, Bastien François, Irene Schicker, Kirien Whan, Elisa Perrone
  year: 2025
  arxiv: 2510.25610v1
  abstract: 'Weather predictions are often provided as ensembles generated by repeated
    runs of numerical weather prediction models. These forecasts typically exhibit
    bias and inaccurate dependence structures due to numerical and dispersion errors,
    requiring statistical postprocessing for improved precision. A common correction
    strategy is the two-step approach: first adjusting the univariate forecasts, then
    reconstructing the multivariate dependence. The second step is usually handled
    with nonparametric methods, which can underperform when historical data are limited.
    Parametric alternatives, such as the Gaussian Copula Approach (GCA), offer theoretical
    advantages but often produce poorly calibrated multivariate forecasts due to random
    sampling of the corrected univariate margins. In this work, we introduce COBASE,
    a novel copula-based postprocessing framework that preserves the flexibility of
    parametric modeling while mimicking the nonparametric techniques through a rank-shuffling
    mechanism. This design ensures calibrated margins and realistic dependence reconstruction.
    We evaluate COBASE on multi-site 2-meter temperature forecasts from the ALADIN-LAEF
    ensemble over Austria and on joint forecasts of temperature and dew point temperature
    from the ECMWF system in the Netherlands. Across all regions, COBASE variants
    consistently outperform traditional copula-based approaches, such as GCA, and
    achieve performance on par with state-of-the-art nonparametric methods like SimSchaake
    and ECC, with only minimal differences across settings. These results position
    COBASE as a competitive and robust alternative for multivariate ensemble postprocessing,
    offering a principled bridge between parametric and nonparametric dependence reconstruction.'
  tags: []
- category: Data Assimilation
  title: Interpolated Discrepancy Data Assimilation for PDEs with Sparse Observations
  authors: Tong Wu, Humberto Godinez, Vitaliy Gyrya, James M. Hyman
  year: 2025
  arxiv: 2510.24944v1
  abstract: Sparse sensor networks in weather and ocean modeling observe only a small
    fraction of the system state, which destabilizes standard nudging-based data assimilation.
    We introduce Interpolated Discrepancy Data Assimilation (IDDA), which modifies
    how discrepancies enter the governing equations. Rather than adding observations
    as a forcing term alone, IDDA also adjusts the nonlinear operator using interpolated
    observational information. This structural change suppresses error amplification
    when nonlinear effects dominate. We prove exponential convergence under explicit
    conditions linking error decay to observation spacing, nudging strength, and diffusion
    coefficient. The key requirement establishes bounds on nudging strength relative
    to observation spacing and diffusion, giving practitioners a clear operating window.
    When observations resolve the relevant scales, error decays at a user-specified
    rate. Critically, the error bound scales with the square of observation spacing
    rather than through hard-to-estimate nonlinear growth rates. We validate IDDA
    on Burgers flow, Kuramoto-Sivashinsky dynamics, and two-dimensional Navier-Stokes
    turbulence. Across these tests, IDDA reaches target accuracy faster than standard
    interpolated nudging, remains stable in chaotic regimes, avoids non-monotone transients,
    and requires minimal parameter tuning. Because IDDA uses standard explicit time
    integration, it fits readily into existing simulation pipelines without specialized
    solvers. These properties make IDDA a practical upgrade for operational systems
    constrained by sparse sensor coverage.
  tags: []
- category: Downscaling
  title: A PDE-Informed Latent Diffusion Model for 2-m Temperature Downscaling
  authors: Paul Rosu, Muchang Bahng, Erick Jiang, Rico Zhu, Vahid Tarokh
  year: 2025
  arxiv: 2510.23866v1
  abstract: This work presents a physics-conditioned latent diffusion model tailored
    for dynamical downscaling of atmospheric data, with a focus on reconstructing
    high-resolution 2-m temperature fields. Building upon a pre-existing diffusion
    architecture and employing a residual formulation against a reference UNet, we
    integrate a partial differential equation (PDE) loss term into the model's training
    objective. The PDE loss is computed in the full resolution (pixel) space by decoding
    the latent representation and is designed to enforce physical consistency through
    a finite-difference approximation of an effective advection-diffusion balance.
    Empirical observations indicate that conventional diffusion training already yields
    low PDE residuals, and we investigate how fine-tuning with this additional loss
    further regularizes the model and enhances the physical plausibility of the generated
    fields. The entirety of our codebase is available on Github, for future reference
    and development.
  tags:
  - diffusion
  - CNN
- category: Global Models
  title: Revealing the Potential of Learnable Perturbation Ensemble Forecast Model
    for Tropical Cyclone Prediction
  authors: Jun Liu, Tao Zhou, Jiarui Li, Xiaohui Zhong, Peng Zhang, Jie Feng, Lei
    Chen, Hao Li
  year: 2025
  arxiv: 2510.23794v1
  abstract: Tropical cyclones (TCs) are highly destructive and inherently uncertain
    weather systems. Ensemble forecasting helps quantify these uncertainties, yet
    traditional systems are constrained by high computational costs and limited capability
    to fully represent atmospheric nonlinearity. FuXi-ENS introduces a learnable perturbation
    scheme for ensemble generation, representing a novel AI-based forecasting paradigm.
    Here, we systematically compare FuXi-ENS with ECMWF-ENS using all 90 global TCs
    in 2018, examining their performance in TC-related physical variables, track and
    intensity forecasts, and the associated dynamical and thermodynamical fields.
    FuXi-ENS demonstrates clear advantages in predicting TC-related physical variables,
    and achieves more accurate track forecasts with reduced ensemble spread, though
    it still underestimates intensity relative to observations. Further dynamical
    and thermodynamical analyses reveal that FuXi-ENS better captures large-scale
    circulation, with moisture turbulent energy more tightly concentrated around the
    TC warm core, whereas ECMWF-ENS exhibits a more dispersed distribution. These
    findings highlight the potential of learnable perturbations to improve TC forecasting
    skill and provide valuable insights for advancing AI-based ensemble prediction
    of extreme weather events that have significant societal impacts.
  tags: []
- category: Data Assimilation
  title: 'LO-SDA: Latent Optimization for Score-based Atmospheric Data Assimilation'
  authors: Jing-An Sun, Hang Fan, Junchao Gong, Ben Fei, Kun Chen, Fenghua Ling, Wenlong
    Zhang, Wanghan Xu, Li Yan, Pierre Gentine, Lei Bai
  year: 2025
  arxiv: 2510.22562v1
  abstract: Data assimilation (DA) plays a pivotal role in numerical weather prediction
    by systematically integrating sparse observations with model forecasts to estimate
    optimal atmospheric initial condition for forthcoming forecasts. Traditional Bayesian
    DA methods adopt a Gaussian background prior as a practical compromise for the
    curse of dimensionality in atmospheric systems, that simplifies the nonlinear
    nature of atmospheric dynamics and can result in biased estimates. To address
    this limitation, we propose a novel generative DA method, LO-SDA. First, a variational
    autoencoder is trained to learn compact latent representations that disentangle
    complex atmospheric correlations. Within this latent space, a background-conditioned
    diffusion model is employed to directly learn the conditional distribution from
    data, thereby generalizing and removing assumptions in the Gaussian prior in traditional
    DA methods. Most importantly, we introduce latent optimization during the reverse
    process of the diffusion model to ensure strict consistency between the generated
    states and sparse observations. Idealized experiments demonstrate that LO-SDA
    not only outperforms score-based DA methods based on diffusion posterior sampling
    but also surpasses traditional DA approaches. To our knowledge, this is the first
    time that a diffusion-based DA method demonstrates the potential to outperform
    traditional approaches on high-dimensional global atmospheric systems. These findings
    suggest that long-standing reliance on Gaussian priors-a foundational assumption
    in operational atmospheric DA-may no longer be necessary in light of advances
    in generative modeling.
  tags:
  - diffusion
  - variational
  - probabilistic
- category: Nowcasting
  title: 'Nowcast3D: Reliable precipitation nowcasting via gray-box learning'
  authors: Huaguan Chen, Wei Han, Haofei Sun, Ning Lin, Xingtao Song, Yunfan Yang,
    Jie Tian, Yang Liu, Ji-Rong Wen, Xiaoye Zhang, Xueshun Shen, Hao Sun
  year: 2025
  arxiv: 2511.04659v1
  abstract: Extreme precipitation nowcasting demands high spatiotemporal fidelity
    and extended lead times, yet existing approaches remain limited. Numerical Weather
    Prediction (NWP) and its deep-learning emulations are too slow and coarse for
    rapidly evolving convection, while extrapolation and purely data-driven models
    suffer from error accumulation and excessive smoothing. Hybrid 2D radar-based
    methods discard crucial vertical information, preventing accurate reconstruction
    of height-dependent dynamics. We introduce a gray-box, fully three-dimensional
    nowcasting framework that directly processes volumetric radar reflectivity and
    couples physically constrained neural operators with datadriven learning. The
    model learns vertically varying 3D advection fields under a conservative advection
    operator, parameterizes spatially varying diffusion, and introduces a Brownian-motion--inspired
    stochastic term to represent unresolved motions. A residual branch captures small-scale
    convective initiation and microphysical variability, while a diffusion-based stochastic
    module estimates uncertainty. The framework achieves more accurate forecasts up
    to three-hour lead time across precipitation regimes and ranked first in 57\%
    of cases in a blind evaluation by 160 meteorologists. By restoring full 3D dynamics
    with physical consistency, it offers a scalable and robust pathway for skillful
    and reliable nowcasting of extreme precipitation.
  tags:
  - operator-learning
- category: Climate Modeling
  title: Deep Learning-Driven Downscaling for Climate Risk Assessment of Projected
    Temperature Extremes in the Nordic Region
  authors: Parthiban Loganathan, Elias Zea, Ricardo Vinuesa, Evelyn Otero
  year: 2025
  arxiv: 2511.03770v1
  abstract: 'Rapid changes and increasing climatic variability across the widely varied
    Koppen-Geiger regions of northern Europe generate significant needs for adaptation.
    Regional planning needs high-resolution projected temperatures. This work presents
    an integrative downscaling framework that incorporates Vision Transformer (ViT),
    Convolutional Long Short-Term Memory (ConvLSTM), and Geospatial Spatiotemporal
    Transformer with Attention and Imbalance-Aware Network (GeoStaNet) models. The
    framework is evaluated with a multicriteria decision system, Deep Learning-TOPSIS
    (DL-TOPSIS), for ten strategically chosen meteorological stations encompassing
    the temperate oceanic (Cfb), subpolar oceanic (Cfc), warm-summer continental (Dfb),
    and subarctic (Dfc) climate regions. Norwegian Earth System Model (NorESM2-LM)
    Coupled Model Intercomparison Project Phase 6 (CMIP6) outputs were bias-corrected
    during the 1951-2014 period and subsequently validated against earlier observations
    of day-to-day temperature metrics and diurnal range statistics. The ViT showed
    improved performance (Root Mean Squared Error (RMSE): 1.01 degrees C; R^2: 0.92),
    allowing for production of credible downscaled projections. Under the SSP5-8.5
    scenario, the Dfc and Dfb climate zones are projected to warm by 4.8 degrees C
    and 3.9 degrees C, respectively, by 2100, with expansion in the diurnal temperature
    range by more than 1.5 degrees C. The Time of Emergence signal first appears in
    subarctic winter seasons (Dfc: approximately 2032), signifying an urgent need
    for adaptation measures. The presented framework offers station-based, high-resolution
    estimates of uncertainties and extremes, with direct uses for adaptation policy
    over high-latitude regions with fast environmental change.'
  tags:
  - transformer
  - recurrent
- category: Climate Modeling
  title: A Probabilistic U-Net Approach to Downscaling Climate Simulations
  authors: Maryam Alipourhajiagha, Pierre-Louis Lemaire, Youssef Diouane, Julie Carreau
  year: 2025
  arxiv: 2511.03197v1
  abstract: Climate models are limited by heavy computational costs, often producing
    outputs at coarse spatial resolutions, while many climate change impact studies
    require finer scales. Statistical downscaling bridges this gap, and we adapt the
    probabilistic U-Net for this task, combining a deterministic U-Net backbone with
    a variational latent space to capture aleatoric uncertainty. We evaluate four
    training objectives, afCRPS and WMSE-MS-SSIM with three settings for downscaling
    precipitation and temperature from $16\times$ coarser resolution. Our main finding
    is that WMSE-MS-SSIM performs well for extremes under certain settings, whereas
    afCRPS better captures spatial variability across scales.
  tags:
  - CNN
  - probabilistic
- category: Climate Modeling
  title: Intercomparison of a High-Resolution Regional Climate Model Ensemble for
    Catchment-Scale Water Cycle Processes under Human Influence
  authors: J. L. Roque, F. Da Silva Lopes, J. A. Giles, B. D. Gutknecht, B. Schalge,
    Y. Zhang, M. Ferro, P. Friederichs, K. Goergen, S. Poll, A. Valmassoi
  year: 2025
  arxiv: 2511.02799v1
  abstract: Understanding regional hydroclimatic variability and its drivers is essential
    for anticipating the impacts of climate change on water resources and sustainability.
    Yet, considerable uncertainty remains in the simulation of the coupled land atmosphere
    water and energy cycles, largely due to structural model limitations, simplified
    process representations, and insufficient spatial resolution. Within the framework
    of the Collaborative Research Center 1502 DETECT, this study presents a coordinated
    intercomparison of regional climate model simulations designed for water cycle
    process analysis over Europe. We analyze the performance of simulations using
    the ICON and TSMP1 model systems and covering the period from 1990 to 2020, comparing
    against reference datasets (E-OBS, GPCC, and GLEAM). We focus on 2 m air temperature,
    precipitation and evapotranspiration over four representative basins, the Ebro,
    Po, Rhine, and Tisa, within the EURO CORDEX domain.   Our analysis reveals systematic
    cold biases across all basins and seasons, with ICON generally outperforming TSMP1.
    Precipitation biases exhibit substantial spread, particularly in summer, reflecting
    the persistent challenge of accurately simulating precipitation. ICON tends to
    underestimate evapotranspiration, while TSMP1 performs better some seasons. Sensitivity
    experiments further indicate that the inclusion of irrigation improves simulation
    performance in the Po basin, which is intensively irrigated, and that higher-resolution
    sea surface temperature forcing data improves the overall precipitation representation.
    This baseline evaluation provides a first assessment of the DETECT multimodel
    ensemble and highlights key structural differences influencing model skill across
    hydroclimatic regimes.
  tags: []
- category: Data Assimilation
  title: 'DAMBench: A Multi-Modal Benchmark for Deep Learning-based Atmospheric Data
    Assimilation'
  authors: Hao Wang, Zixuan Weng, Jindong Han, Wei Fan, Hao Liu
  year: 2025
  arxiv: 2511.01468v1
  abstract: 'Data Assimilation is a cornerstone of atmospheric system modeling, tasked
    with reconstructing system states by integrating sparse, noisy observations with
    prior estimation. While traditional approaches like variational and ensemble Kalman
    filtering have proven effective, recent advances in deep learning offer more scalable,
    efficient, and flexible alternatives better suited for complex, real-world data
    assimilation involving large-scale and multi-modal observations. However, existing
    deep learning-based DA research suffers from two critical limitations: (1) reliance
    on oversimplified scenarios with synthetically perturbed observations, and (2)
    the absence of standardized benchmarks for fair model comparison. To address these
    gaps, in this work, we introduce DAMBench, the first large-scale multi-modal benchmark
    designed to evaluate data-driven DA models under realistic atmospheric conditions.
    DAMBench integrates high-quality background states from state-of-the-art forecasting
    systems and real-world multi-modal observations (i.e., real-world weather stations
    and satellite imagery). All data are resampled to a common grid and temporally
    aligned to support systematic training, validation, and testing. We provide unified
    evaluation protocols and benchmark representative data assimilation approaches,
    including latent generative models and neural process frameworks. Additionally,
    we propose a lightweight multi-modal plugin to demonstrate how integrating realistic
    observations can enhance even simple baselines. Through comprehensive experiments,
    DAMBench establishes a rigorous foundation for future research, promoting reproducibility,
    fair comparison, and extensibility to real-world multi-modal scenarios. Our dataset
    and code are publicly available at https://github.com/figerhaowang/DAMBench.'
  tags: []
  github: https://github.com/figerhaowang/DAMBench
- category: Ensembles
  title: The Role of Deep Mesoscale Eddies in Ensemble Forecast Performance
  authors: Justin Cooke, Kathleen Donohue, Clark D Rowley, Prasad G Thoppil, D Randolph
    Watts
  year: 2025
  arxiv: 2511.09747v1
  abstract: Present forecasting efforts rely on assimilation of observational data
    captured in the upper ocean (< 1000 m depth). These observations constrain the
    upper ocean and minimally influence the deep ocean. Nevertheless, development
    of the full water column circulation critically depends upon the dynamical interactions
    between upper and deep fields. Forecasts demonstrate that the initialization of
    the deep field is influential for the development and evolution of the surface
    in the forecast. Deep initial conditions that better agree with observations have
    lower upper ocean uncertainty as the forecast progresses. Here, best and worst
    ensemble members in two 92-day forecasts are identified and contrasted in order
    to determine how the deep ocean differs between these groups. The forecasts cover
    the duration of the Loop Current Eddy Thor separation event, which coincides with
    available deep observations in the Gulf. Model member performance is assessed
    by comparing surface variables against verifying analysis and satellite altimeter
    data during the forecast time-period. Deep cyclonic and anticyclonic features
    are reviewed, and compared against deep observations, indicating subtle differences
    in locations of deep eddies at relevant times. These results highlight both the
    importance of deep circulation in the dynamics of the Loop Current system and
    more broadly motivate efforts to assimilate deep observations to better constrain
    the deep initial fields and improve surface predictions.
  tags: []
- category: Nowcasting
  title: 'FlowCast: Advancing Precipitation Nowcasting with Conditional Flow Matching'
  authors: Bernardo Perrone Ribeiro, Jana Faganeli Pucer
  year: 2025
  arxiv: 2511.09731v1
  abstract: 'Radar-based precipitation nowcasting, the task of forecasting short-term
    precipitation fields from previous radar images, is a critical problem for flood
    risk management and decision-making. While deep learning has substantially advanced
    this field, two challenges remain fundamental: the uncertainty of atmospheric
    dynamics and the efficient modeling of high-dimensional data. Diffusion models
    have shown strong promise by producing sharp, reliable forecasts, but their iterative
    sampling process is computationally prohibitive for time-critical applications.
    We introduce FlowCast, the first model to apply Conditional Flow Matching (CFM)
    to precipitation nowcasting. Unlike diffusion, CFM learns a direct noise-to-data
    mapping, enabling rapid, high-fidelity sample generation with drastically fewer
    function evaluations. Our experiments demonstrate that FlowCast establishes a
    new state-of-the-art in predictive accuracy. A direct comparison further reveals
    the CFM objective is both more accurate and significantly more efficient than
    a diffusion objective on the same architecture, maintaining high performance with
    significantly fewer sampling steps. This work positions CFM as a powerful and
    practical alternative for high-dimensional spatiotemporal forecasting.'
  tags:
  - diffusion
- category: Climate Modeling
  title: Efficient Regional Storm Surge Surrogate Model Training Strategy Under Evolving
    Landscape and Climate Scenarios
  authors: Ziyue Liu, Mohammad Ahmadi Gharehtoragh, Brenna Kari Losch, David R. Johnson
  year: 2025
  arxiv: 2511.07269v1
  abstract: 'Coastal communities can be exposed to risk from catastrophic storm-induced
    coastal hazards, causing major global losses each year. Recent advances in computational
    power have enabled the integration of machine learning (ML) into coastal hazard
    modeling, particularly for storm surge prediction. Given the potential variation
    in future climate and landscape conditions, efficient predictive models that can
    incorporate multiple future scenarios are needed. Existing studies built a framework
    for training ML models using storm surge simulation data under different potential
    future climate and landscape scenarios. However, storm surge simulation data under
    designed future scenarios require computationally expensive numerical simulations
    of synthetic storm suites over extensive geospatial grids. As the number of designed
    scenarios increases, the computational cost associated with both numerical simulation
    and ML training increases rapidly. This study introduces a cost-effective reduction
    strategy that incorporates new scenario data while minimizing computational burden.
    The approach reduces training data across three dimensions: (1) grid points, (2)
    input features, and (3) storm suite size. Reducing the storm suite size is especially
    effective in cutting simulation costs. Model performance was evaluated using different
    ML algorithms, showing consistent effectiveness. When trained on 5,000 of 80,000
    grid points, 10 of 12 features, and 40 of 90 storms, the model achieved an R=0.93,
    comparable to that of models trained on the full dataset, with substantially lower
    computational expense.'
  tags: []
- category: Data Assimilation
  title: 'Towards Streaming Prediction of Oscillatory Flows: A Data Assimilation and
    Machine Learning Approach'
  authors: Miguel M. Valero, Marcello Meldi
  year: 2025
  arxiv: 2511.15758v1
  abstract: Data-driven methods have demonstrated strong predictive capabilities in
    fluid mechanics, yet most current applications still focus on simplified configurations,
    often characterised by statistical stationarity or limited temporal variability.
    This work proposes a methodology that combines Data Assimilation (DA) and Machine
    Learning (ML) to predict flow configurations that exhibit cyclic behaviour over
    time. Starting from limited, sparse high-fidelity measurements and a low-fidelity
    numerical model, the DA approach performs data fusion to obtain complete and accurate
    flow state estimations in time. This complete dataset is used to train multiple
    ML tools, which are applied across different phases of the flow cycle to augment
    the model's predictions when high-fidelity data might not be available for the
    DA application. The methodology is applied to the analysis of an oscillating cylinder
    in a laminar regime using a sliding-window approach, in which separate models
    are trained for specific flow conditions to ensure each model specialises in flow
    dynamics representative of a phase of the oscillation period. This phase-resolved
    learning enables the efficient capture of transient features that would be challenging
    for a single global model. The results highlight the potential of this method
    to study complex flow configurations with oscillatory features in which neither
    the flow nor the cycle is known a priori, in particular by exploiting real-time
    training and updates, as is commonly done in digital twins, which require continuous
    model correction and adaptation.
  tags: []
- category: Ensembles
  title: Bridging the Gap Between Bayesian Deep Learning and Ensemble Weather Forecasts
  authors: Xinlei Xiong, Wenbo Hu, Shuxun Zhou, Kaifeng Bi, Lingxi Xie, Ying Liu,
    Richang Hong, Qi Tian
  year: 2025
  arxiv: 2511.14218v1
  abstract: Weather forecasting is fundamentally challenged by the chaotic nature
    of the atmosphere, necessitating probabilistic approaches to quantify uncertainty.
    While traditional ensemble prediction (EPS) addresses this through computationally
    intensive simulations, recent advances in Bayesian Deep Learning (BDL) offer a
    promising but often disconnected alternative. We bridge these paradigms through
    a unified hybrid Bayesian Deep Learning framework for ensemble weather forecasting
    that explicitly decomposes predictive uncertainty into epistemic and aleatoric
    components, learned via variational inference and a physics-informed stochastic
    perturbation scheme modeling flow-dependent atmospheric dynamics, respectively.
    We further establish a unified theoretical framework that rigorously connects
    BDL and EPS, providing formal theorems that decompose total predictive uncertainty
    into epistemic and aleatoric components under the hybrid BDL framework. We validate
    our framework on the large-scale 40-year ERA5 reanalysis dataset (1979-2019) with
    0.25° spatial resolution. Experimental results show that our method not only improves
    forecast accuracy and yields better-calibrated uncertainty quantification but
    also achieves superior computational efficiency compared to state-of-the-art probabilistic
    diffusion models. We commit to making our code open-source upon acceptance of
    this paper.
  tags:
  - diffusion
  - physics-informed
  - variational
  - probabilistic
- category: Other
  title: 'Weather Maps as Tokens: Transformers for Renewable Energy Forecasting'
  authors: Federico Battini
  year: 2025
  arxiv: 2511.13935v2
  abstract: 'Accurate renewable energy forecasting is essential to reduce dependence
    on fossil fuels and enabling grid decarbonization. However, current approaches
    fail to effectively integrate the rich spatial context of weather patterns with
    their temporal evolution. This work introduces a novel approach that treats weather
    maps as tokens in transformer sequences to predict renewable energy. Hourly weather
    maps are encoded as spatial tokens using a lightweight convolutional neural network,
    and then processed by a transformer to capture temporal dynamics across a 45-hour
    forecast horizon. Despite disadvantages in input initialization, evaluation against
    ENTSO-E operational forecasts shows a reduction in RMSE of about 60% and 20% for
    wind and solar respectively. A live dashboard showing daily forecasts is available
    at: https://www.sardiniaforecast.ifabfoundation.it.'
  tags:
  - transformer
  - CNN
- category: Data Assimilation
  title: Exploring Ultra Rapid Data Assimilation Based on Ensemble Transform Kalman
    Filter with the Lorenz 96 Model
  authors: Fumitoshi Kawasaki, Atsushi Okazaki, Kenta Kurosawa, Shunji Kotsuki
  year: 2025
  arxiv: 2511.12620v1
  abstract: To explore the effectiveness of ultra-rapid data assimilation (URDA) for
    numerical weather prediction (NWP), this study investigates the properties of
    URDA in nonlinear models and proposes technical treatments to enhance its performance.
    URDA rapidly updates preemptive forecasts derived from observations without integrating
    a dynamical model each time additional observations become available. First, we
    analytically demonstrate that the preemptive forecast obtained by URDA in nonlinear
    models is approximately equivalent to the forecast integrated from the analysis.
    Furthermore, numerical experiments are conducted with the 40-variable Lorenz 96
    model. The results show that URDA in nonlinear models tends to exhibit deterioration
    of forecast accuracy and collapse of ensemble spread when preemptive forecasts
    are repeatedly updated or when the forecasts are extended over longer periods.
    Furthermore, the roles of inflation and localization, both essential technical
    treatments in NWP, are examined in the context of URDA. It is shown that although
    inflation and localization are essential to URDA, conventional inflation techniques
    are not suitable for it. Therefore, this study proposes new technical treatments
    for URDA, namely relaxation to baseline perturbations (RTBP) and relaxation to
    baseline forecast (RTBF). Applying RTBP and RTBF mitigates the difficulties associated
    with URDA and yields preemptive forecasts with higher accuracy than the baseline
    forecast. Consequently, URDA, particularly when combined with RTBP and RTBF, would
    stand as a step toward practical application in NWP.
  tags: []
- category: Other
  title: Causal Feature Selection for Weather-Driven Residential Load Forecasting
  authors: Elise Zhang, François Mirallès, Stéphane Dellacherie, Di Wu, Benoit Boulet
  year: 2025
  arxiv: 2511.20508v1
  abstract: 'Weather is a dominant external driver of residential electricity demand,
    but adding many meteorological covariates can inflate model complexity and may
    even impair accuracy. Selecting appropriate exogenous features is non-trivial
    and calls for a principled selection framework, given the direct operational implications
    for day-to-day planning and reliability. This work investigates whether causal
    feature selection can retain the most informative weather drivers while improving
    parsimony and robustness for short-term load forecasting. We present a case study
    on Southern Ontario with two open-source datasets: (i) IESO hourly electricity
    consumption by Forward Sortation Areas; (ii) ERA5 weather reanalysis data. We
    compare different feature selection regimes (no feature selection, non-causal
    selection, PCMCI-causal selection) on city-level forecasting with three different
    time series forecasting models: GRU, TCN, PatchTST. In the feature analysis, non-causal
    selection prioritizes radiation and moisture variables that show correlational
    dependence, whereas PCMCI-causal selection emphasizes more direct thermal drivers
    and prunes the indirect covariates. We detail the evaluation pipeline and report
    diagnostics on prediction accuracy and extreme-weather robustness, positioning
    causal feature selection as a practical complement to modern forecasters when
    integrating weather into residential load forecasting.'
  tags: []
- category: Other
  title: The promising potential of vision language models for the generation of textual
    weather forecasts
  authors: Edward C. C. Steele, Dinesh Mane, Emilio Monti, Luis Orus, Rebecca Chantrill-Cheyette,
    Matthew Couch, Kirstine I. Dale, Simon Eaton, Govindarajan Rangarajan, Amir Majlesi,
    Steven Ramsdale, Michael Sharpe, Craig Smith, Jonathan Smith, Rebecca Yates, Holly
    Ellis, Charles Ewen
  year: 2025
  arxiv: 2512.03623v1
  abstract: Despite the promising capability of multimodal foundation models, their
    application to the generation of meteorological products and services remains
    nascent. To accelerate aspiration and adoption, we explore the novel use of a
    vision language model for writing the iconic Shipping Forecast text directly from
    video-encoded gridded weather data. These early results demonstrate promising
    scalable technological opportunities for enhancing production efficiency and service
    innovation within the weather enterprise and beyond.
  tags:
  - foundation-model
- category: Global Models
  title: Observation-driven correction of numerical weather prediction for marine
    winds
  authors: Matteo Peduto, Qidong Yang, Jonathan Giezendanner, Devis Tuia, Sherrie
    Wang
  year: 2025
  arxiv: 2512.03606v1
  abstract: Accurate marine wind forecasts are essential for safe navigation, ship
    routing, and energy operations, yet they remain challenging because observations
    over the ocean are sparse, heterogeneous, and temporally variable. We reformulate
    wind forecasting as observation-informed correction of a global numerical weather
    prediction (NWP) model. Rather than forecasting winds directly, we learn local
    correction patterns by assimilating the latest in-situ observations to adjust
    the Global Forecast System (GFS) output. We propose a transformer-based deep learning
    architecture that (i) handles irregular and time-varying observation sets through
    masking and set-based attention mechanisms, (ii) conditions predictions on recent
    observation-forecast pairs via cross-attention, and (iii) employs cyclical time
    embeddings and coordinate-aware location representations to enable single-pass
    inference at arbitrary spatial coordinates. We evaluate our model over the Atlantic
    Ocean using observations from the International Comprehensive Ocean-Atmosphere
    Data Set (ICOADS) as reference. The model reduces GFS 10-meter wind RMSE at all
    lead times up to 48 hours, achieving 45% improvement at 1-hour lead time and 13%
    improvement at 48-hour lead time. Spatial analyses reveal the most persistent
    improvements along coastlines and shipping routes, where observations are most
    abundant. The tokenized architecture naturally accommodates heterogeneous observing
    platforms (ships, buoys, tide gauges, and coastal stations) and produces both
    site-specific predictions and basin-scale gridded products in a single forward
    pass. These results demonstrate a practical, low-latency post-processing approach
    that complements NWP by learning to correct systematic forecast errors.
  tags:
  - transformer
- category: Climate Modeling
  title: 'EcoCast: A Spatio-Temporal Model for Continual Biodiversity and Climate
    Risk Forecasting'
  authors: Hammed A. Akande, Abdulrauf A. Gidado
  year: 2025
  arxiv: 2512.02260v1
  abstract: Increasing climate change and habitat loss are driving unprecedented shifts
    in species distributions. Conservation professionals urgently need timely, high-resolution
    predictions of biodiversity risks, especially in ecologically diverse regions
    like Africa. We propose EcoCast, a spatio-temporal model designed for continual
    biodiversity and climate risk forecasting. Utilizing multisource satellite imagery,
    climate data, and citizen science occurrence records, EcoCast predicts near-term
    (monthly to seasonal) shifts in species distributions through sequence-based transformers
    that model spatio-temporal environmental dependencies. The architecture is designed
    with support for continual learning to enable future operational deployment with
    new data streams. Our pilot study in Africa shows promising improvements in forecasting
    distributions of selected bird species compared to a Random Forest baseline, highlighting
    EcoCast's potential to inform targeted conservation policies. By demonstrating
    an end-to-end pipeline from multi-modal data ingestion to operational forecasting,
    EcoCast bridges the gap between cutting-edge machine learning and biodiversity
    management, ultimately guiding data-driven strategies for climate resilience and
    ecosystem conservation throughout Africa.
  tags:
  - transformer
- category: Ensembles
  title: Are we misdiagnosing ensemble forecast reliability? On the insufficiency
    of Spread-Error and rank-based reliability metrics
  authors: Arlan Dirkson, Mark Buehner
  year: 2025
  arxiv: 2512.02160v1
  abstract: It has been documented that Spread-Error equality and a flat rank histogram
    are necessary but insufficient for demonstrating ensemble forecast reliability.
    Nevertheless, these metrics are heavily relied upon, both in the literature and
    at operational numerical weather prediction centers. In this study, we demonstrate
    theoretically why the Spread-Error relationship is necessary but insufficient
    for diagnosing reliability up to second order, even when mean bias is absent or
    accounted for. Assuming joint normality between ensemble members and the reference
    truth, we further show with idealized experiments that the same covariance structure
    responsible for this insufficiency also produces false diagnoses of reliability
    with the rank histogram and the reliability component of the continuous rank probability
    score. Under this structure and when the ensemble mean is meaningfully different
    from climatology, the truth lies among the least (most) extreme members when climatological
    variance is excessive (deficient) in each member. Importantly, this behavior is
    also shown to be plausible in operational ensemble weather forecasts. Combining
    these results with calibration principles from statistical postprocessing leads
    us to conclude that both perfect dispersion and underdispersion are ill-defined.
    When diagnostics are misinterpreted as indicating the latter, improper tuning
    can lead to further deterioration of forecast quality, even while improving Spread-Error
    and rank histogram behavior. To address these issues, we propose a new reliability
    diagnostic based on three easily computed statistics, motivated by the structure
    of the joint distribution of ensemble members and the reference truth up to second
    order. The diagnostic separates contributions to unreliability originating from
    climatology and predictability, enabling a more precise and robust characterization
    of ensemble behavior.
  tags: []
- category: Downscaling
  title: On Global Applicability and Location Transferability of Generative Deep Learning
    Models for Precipitation Downscaling
  authors: Paula Harder, Christian Lessig, Matthew Chantry, Francis Pelletier, David
    Rolnick
  year: 2025
  arxiv: 2512.01400v1
  abstract: Deep learning offers promising capabilities for the statistical downscaling
    of climate and weather forecasts, with generative approaches showing particular
    success in capturing fine-scale precipitation patterns. However, most existing
    models are region-specific, and their ability to generalize to unseen geographic
    areas remains largely unexplored. In this study, we evaluate the generalization
    performance of generative downscaling models across diverse regions. Using a global
    framework, we employ ERA5 reanalysis data as predictors and IMERG precipitation
    estimates at $0.1^\circ$ resolution as targets. A hierarchical location-based
    data split enables a systematic assessment of model performance across 15 regions
    around the world.
  tags: []
- category: Data Assimilation
  title: Data assimilation and discrepancy modeling with shallow recurrent decoders
  authors: Yuxuan Bao, J. Nathan Kutz
  year: 2025
  arxiv: 2512.01170v1
  abstract: The requirements of modern sensing are rapidly evolving, driven by increasing
    demands for data efficiency, real-time processing, and deployment under limited
    sensing coverage. Complex physical systems are often characterized through the
    integration of a limited number of point sensors in combination with scientific
    computations which approximate the dominant, full-state dynamics. Simulation models,
    however, inevitably neglect small-scale or hidden processes, are sensitive to
    perturbations, or oversimplify parameter correlations, leading to reconstructions
    that often diverge from the reality measured by sensors. This creates a critical
    need for data assimilation, the process of integrating observational data with
    predictive simulation models to produce coherent and accurate estimates of the
    full state of complex physical systems. We propose a machine learning framework
    for Data Assimilation with a SHallow REcurrent Decoder (DA-SHRED) which bridges
    the simulation-to-real (SIM2REAL) gap between computational modeling and experimental
    sensor data. For real-world physics systems modeling high-dimensional spatiotemporal
    fields, where the full state cannot be directly observed and must be inferred
    from sparse sensor measurements, we leverage the latent space learned from a reduced
    simulation model via SHRED, and update these latent variables using real sensor
    data to accurately reconstruct the full system state. Furthermore, our algorithm
    incorporates a sparse identification of nonlinear dynamics based regression model
    in the latent space to identify functionals corresponding to missing dynamics
    in the simulation model. We demonstrate that DA-SHRED successfully closes the
    SIM2REAL gap and additionally recovers missing dynamics in highly complex systems,
    demonstrating that the combination of efficient temporal encoding and physics-informed
    correction enables robust data assimilation.
  tags:
  - physics-informed
- category: Nowcasting
  title: 'PIANO: Physics-informed Dual Neural Operator for Precipitation Nowcasting'
  authors: Seokhyun Chin, Junghwan Park, Woojin Cho
  year: 2025
  arxiv: 2512.01062v1
  abstract: Precipitation nowcasting, key for early warning of disasters, currently
    relies on computationally expensive and restrictive methods that limit access
    to many countries. To overcome this challenge, we propose precipitation nowcasting
    using satellite imagery with physics constraints for improved accuracy and physical
    consistency. We use a novel physics-informed dual neural operator (PIANO) structure
    to enforce the fundamental equation of advection-diffusion during training to
    predict satellite imagery using a PINN loss. Then, we use a generative model to
    convert satellite images to radar images, which are used for precipitation nowcasting.
    Compared to baseline models, our proposed model shows a notable improvement in
    moderate (4mm/h) precipitation event prediction alongside short-term heavy (8mm/h)
    precipitation event prediction. It also demonstrates low seasonal variability
    in predictions, indicating robustness for generalization. This study suggests
    the potential of the PIANO and serves as a good baseline for physics-informed
    precipitation nowcasting.
  tags:
  - physics-informed
  - operator-learning
- category: Data Assimilation
  title: 'Predicting CME Arrivals with Heliospheric Imagers from L5: A Data Assimilation
    Approach'
  authors: Tanja Amerstorfer, Justin Le Louëdec, David Barnes, Maike Bauer, Jackie
    A. Davies, Satabdwa Majumdar, Eva Weiler, Christian Möstl
  year: 2025
  arxiv: 2512.09738v1
  abstract: The Solar TErrestrial RElations Observatory (STEREO) mission has laid
    a foundation for advancing real-time space weather forecasting by enabling the
    evaluation of heliospheric imager (HI) data for predicting coronal mass ejection
    (CME) arrivals at Earth. This study employs the ELEvoHI model to assess how incorporating
    STEREO/HI data from the Lagrange 5 (L5) perspective can enhance prediction accuracy
    for CME arrival times and speeds. Our investigation, preparing for the upcoming
    ESA Vigil mission, explores whether the progressive incorporation of HI data in
    real-time enhances forecasting accuracy. The role of human tracking variability
    is evaluated by comparing predictions based on observations by three different
    scientists, highlighting the influence of manual biases on forecasting outcomes.
    Furthermore, the study examines the efficacy of deriving CME propagation directions
    using HI-specific methods versus coronagraph-based techniques, emphasising the
    trade-offs in prediction accuracy. Our results demonstrate the potential of HI
    data to significantly improve operational space weather forecasting when integrated
    with other observational platforms, especially when HI data from beyond 35° elongation
    are used. These findings pave the way for optimising real-time prediction methodologies,
    providing valuable groundwork for the forthcoming Vigil mission and enhancing
    preparedness for CME-driven space weather events.
  tags: []
- category: Climate Modeling
  title: 'Bridging CORDEX and CMIP6: Machine Learning Downscaling for Wind and Solar
    Energy Droughts in Central Europe'
  authors: Nina Effenberger, Maxim Samarin, Maybritt Schillinger, Reto Knutti
  year: 2025
  arxiv: 2512.07429v1
  abstract: 'Reliable regional climate information is essential for assessing the
    impacts of climate change and for planning in sectors such as renewable energy;
    yet, producing high-resolution projections through coordinated initiatives like
    CORDEX that run multiple physical regional climate models is both computationally
    demanding and difficult to organize. Machine learning emulators that learn the
    mapping between global and regional climate fields offer a promising way to address
    these limitations. Here we introduce the application of such an emulator: trained
    on CMIP5 and CORDEX simulations, it reproduces regional climate model data with
    sufficient accuracy. When applied to CMIP6 simulations not seen during training,
    it also produces realistic results, indicating stable performance. Using CORDEX
    data, CMIP5 and CMIP6 simulations, as well as regional data generated by two machine
    learning models, we analyze the co-occurrence of low wind speed and low solar
    radiation and find indications that the number of such energy drought days is
    likely to decrease in the future. Our results highlight that downscaling with
    machine learning emulators provides an efficient complement to efforts such as
    CORDEX, supplying the higher-resolution information required for impact assessments.'
  tags: []
- category: Data Assimilation
  title: Continuous data assimilation for 2D stochastic Navier-Stokes equations
  authors: Hakima Bessaih, Benedetta Ferrario, Oussama Landoulsi, Margherita Zanella
  year: 2025
  arxiv: 2512.15184v1
  abstract: Continuous data assimilation methods, such as the nudging algorithm introduced
    by Azouani, Olson, and Titi (AOT) [2], are known to be highly effective in deterministic
    settings for asymptotically synchronizing approximate solutions with observed
    dynamics. In this work, we extend this framework to a stochastic regime by considering
    the two-dimensional incompressible Navier-Stokes equations subject to either additive
    or multiplicative noise. We establish sufficient conditions on the nudging parameter
    and the spatial observation scale that guarantee convergence of the nudged solution
    to the true stochastic flow.   In the case of multiplicative noise, convergence
    holds in expectation, with exponential or polynomial rates depending on the growth
    of the noise covariance. For additive noise, we obtain the exponential convergence
    both in expectation and pathwise. These results yield a stochastic generalization
    of the AOT theory, demonstrating how the interplay between random forcing, viscous
    dissipation and feedback control governs synchronization in stochastic fluid systems.
  tags: []
- category: Global Models
  title: 'Bridging Artificial Intelligence and Data Assimilation: The Data-driven
    Ensemble Forecasting System ClimaX-LETKF'
  authors: Akira Takeshima, Kenta Shiraishi, Atsushi Okazaki, Tadashi Tsuyuki, Shunji
    Kotsuki
  year: 2025
  arxiv: 2512.14444v1
  abstract: While machine learning-based weather prediction (MLWP) has achieved significant
    advancements, research on assimilating real observations or ensemble forecasts
    within MLWP models remains limited. We introduce ClimaX-LETKF, the first purely
    data-driven ML-based ensemble weather forecasting system. It operates stably over
    multiple years, independently of numerical weather prediction (NWP) models, by
    assimilating the NCEP ADP Global Upper Air and Surface Weather Observations. The
    system demonstrates greater stability and accuracy with relaxation to prior perturbation
    (RTPP) than with relaxation to prior spread (RTPS), while NWP models tend to be
    more stable with RTPS. RTPP replaces an analysis perturbation with a weighted
    blend of analysis and background perturbations, whereas RTPS simply rescales the
    analysis perturbation. Our experiments reveal that MLWP models are less capable
    of restoring the atmospheric field to its attractor than NWP models. This work
    provides valuable insights for enhancing MLWP ensemble forecasting systems and
    represents a substantial step toward their practical applications.
  tags: []
- category: Global Models
  title: Evaluating Weather Forecasts from a Decision Maker's Perspective
  authors: Kornelius Raeth, Nicole Ludwig
  year: 2025
  arxiv: 2512.14779v1
  abstract: 'Standard weather forecast evaluations focus on the forecaster''s perspective
    and on a statistical assessment comparing forecasts and observations. In practice,
    however, forecasts are used to make decisions, so it seems natural to take the
    decision-maker''s perspective and quantify the value of a forecast by its ability
    to improve decision-making. Decision calibration provides a novel framework for
    evaluating forecast performance at the decision level rather than the forecast
    level. We evaluate decision calibration to compare Machine Learning and classical
    numerical weather prediction models on various weather-dependent decision tasks.
    We find that model performance at the forecast level does not reliably translate
    to performance in downstream decision-making: some performance differences only
    become apparent at the decision level, and model rankings can change among different
    decision tasks. Our results confirm that typical forecast evaluations are insufficient
    for selecting the optimal forecast model for a specific decision task.'
  tags: []
- category: Climate Modeling
  title: Quantum Machine Learning for Climate Modelling
  authors: Mierk Schwabe, Lorenzo Pastori, Valentina Sarandrea, Veronika Eyring
  year: 2025
  arxiv: 2512.14208v1
  abstract: Quantum machine learning (QML) is making rapid progress, and QML-based
    models hold the promise of quantum advantages such as potentially higher expressivity
    and generalizability than their classical counterparts. Here, we present work
    on using a quantum neural net (QNN) to develop a parameterization of cloud cover
    for an Earth system model (ESM). ESMs are needed for predicting and projecting
    climate change, and can be improved in hybrid models incorporating both traditional
    physics-based components as well as machine learning (ML) models. We show that
    a QNN can predict cloud cover with a performance similar to a classical NN with
    the same number of free parameters and significantly better than the traditional
    scheme. We also analyse the learning capability of the QNN in comparison to the
    classical NN and show that, at least for our example, QNNs learn more consistent
    relationships than classical NNs.
  tags:
  - physics-informed
- category: Climate Modeling
  title: An intercomparison of generative machine learning methods for downscaling
    precipitation at fine spatial scales
  authors: Bryn Ward-Leikis, Neelesh Rampal, Yun Sing Koh, Peter B. Gibson, Hong-Yang
    Liu, Vassili Kitsios, Tristan Meyers, Jeff Adie, Yang Juntao, Steven C. Sherwood
  year: 2025
  arxiv: 2512.13987v1
  abstract: Machine learning (ML) offers a computationally efficient approach for
    generating large ensembles of high-resolution climate projections, but deterministic
    ML methods often smooth fine-scale structures and underestimate extremes. While
    stochastic generative models show promise for predicting fine-scale weather and
    extremes, few studies have compared their performance under present-day and future
    climates. This study compares a previously developed conditional Generative Adversarial
    Network (cGAN) with an intensity constraint against different configurations of
    diffusion models for downscaling daily precipitation from a regional climate model
    (RCM) over Aotearoa New Zealand. Model skill is comprehensively assessed across
    spatial structure, distributional metrics, means, extremes, and their respective
    climate change signals. Both generative approaches outperform the deterministic
    baseline across most metrics and exhibit similar overall skill. Diffusion models
    better predict the fine-scale spatial structure of precipitation and the length
    of dry spells, but underestimate climate change signals for extreme precipitation
    compared to the ground truth RCMs. In contrast, cGANs achieve comparable skill
    for most metrics while better predicting the overall precipitation distribution
    and climate change responses for extremes at a fraction of the computational cost.
    These results demonstrate that while diffusion models can readily generate predictions
    with greater visual "realism", they do not necessarily better preserve climate
    change responses compared to cGANs with intensity constraints. At present, incorporating
    constraints into diffusion models remains challenging compared to cGANs, but may
    represent an opportunity to further improve skill for predicting climate change
    responses.
  tags:
  - diffusion
  - GAN
- category: Downscaling
  title: Time-aware UNet and super-resolution deep residual networks for spatial downscaling
  authors: Mika Sipilä, Sabrina Maggio, Sandra De Iaco, Klaus Nordhausen, Monica Palma,
    Sara Taskinen
  year: 2025
  arxiv: 2512.13753v1
  abstract: Satellite data of atmospheric pollutants are often available only at coarse
    spatial resolution, limiting their applicability in local-scale environmental
    analysis and decision-making. Spatial downscaling methods aim to transform the
    coarse satellite data into high-resolution fields. In this work, two widely used
    deep learning architectures, the super-resolution deep residual network (SRDRN)
    and the encoder-decoder-based UNet, are considered for spatial downscaling of
    tropospheric ozone. Both methods are extended with a lightweight temporal module,
    which encodes observation time using either sinusoidal or radial basis function
    (RBF) encoding, and fuses the temporal features with the spatial representations
    in the networks. The proposed time-aware extensions are evaluated against their
    baseline counterparts in a case study on ozone downscaling over Italy. The results
    suggest that, while only slightly increasing computational complexity, the temporal
    modules significantly improve downscaling performance and convergence speed.
  tags:
  - CNN
- category: Nowcasting
  title: 'STLDM: Spatio-Temporal Latent Diffusion Model for Precipitation Nowcasting'
  authors: Shi Quan Foo, Chi-Ho Wong, Zhihan Gao, Dit-Yan Yeung, Ka-Hing Wong, Wai-Kin
    Wong
  year: 2025
  arxiv: 2512.21118v1
  abstract: 'Precipitation nowcasting is a critical spatio-temporal prediction task
    for society to prevent severe damage owing to extreme weather events. Despite
    the advances in this field, the complex and stochastic nature of this task still
    poses challenges to existing approaches. Specifically, deterministic models tend
    to produce blurry predictions while generative models often struggle with poor
    accuracy. In this paper, we present a simple yet effective model architecture
    termed STLDM, a diffusion-based model that learns the latent representation from
    end to end alongside both the Variational Autoencoder and the conditioning network.
    STLDM decomposes this task into two stages: a deterministic forecasting stage
    handled by the conditioning network, and an enhancement stage performed by the
    latent diffusion model. Experimental results on multiple radar datasets demonstrate
    that STLDM achieves superior performance compared to the state of the art, while
    also improving inference efficiency. The code is available in https://github.com/sqfoo/stldm_official.'
  tags:
  - diffusion
  - variational
  github: https://github.com/sqfoo/stldm_official
- category: Climate Modeling
  title: Quantum Bayesian Optimization for the Automatic Tuning of Lorenz-96 as a
    Surrogate Climate Model
  authors: Paul J. Christiansen, Daniel Ohl de Mello, Cedric Brügmann, Steffen Hien,
    Felix Herbort, Martin Kiffner, Lorenzo Pastori, Veronika Eyring, Mierk Schwabe
  year: 2025
  arxiv: 2512.20437v1
  abstract: In this work, we propose a hybrid quantum-inspired heuristic for automatically
    tuning the Lorenz-96 model -- a simple proxy to describe atmospheric dynamics,
    yet exhibiting chaotic behavior. Building on the history matching framework by
    Lguensat et al. (2023), we fully automate the tuning process with a new convergence
    criterion and propose replacing classical Gaussian process emulators with quantum
    counterparts. We benchmark three quantum kernel architectures, distinguished by
    their quantum feature map circuits. A dimensionality argument implies, in principle,
    an increased expressivity of the quantum kernels over their classical competitors.
    For each kernel type, we perform an extensive hyperparameter optimization of our
    tuning algorithm. We confirm the validity of a quantum-inspired approach based
    on statevector simulation by numerically demonstrating the superiority of two
    studied quantum kernels over the canonical classical RBF kernel. Finally, we discuss
    the pathway towards real quantum hardware, mainly driven by a transition to shot-based
    simulations and evaluating quantum kernels via randomized measurements, which
    can mitigate the effect of gate errors. The very low qubit requirements and moderate
    circuit depths, together with a minimal number of trainable circuit parameters,
    make our method particularly NISQ-friendly.
  tags:
  - probabilistic
- category: Data Assimilation
  title: The Ensemble Schr{ö}dinger Bridge filter for Nonlinear Data Assimilation
  authors: Feng Bao, Hui Sun
  year: 2025
  arxiv: 2512.18928v1
  abstract: This work puts forward a novel nonlinear optimal filter namely the Ensemble
    Schr{ö}dinger Bridge nonlinear filter. The proposed filter finds marriage of the
    standard prediction procedure and the diffusion generative modeling for the analysis
    procedure to realize one filtering step. The designed approach finds no structural
    model error, and it is derivative free, training free and highly parallizable.
    Experimental results show that the designed algorithm performs well given highly
    nonlinear dynamics in (mildly) high dimension up to 40 or above under a chaotic
    environment. It also shows better performance than classical methods such as the
    ensemble Kalman filter and the Particle filter in numerous tests given different
    level of nonlinearity. Future work will focus on extending the proposed approach
    to practical meteorological applications and establishing a rigorous convergence
    analysis.
  tags: []
- category: Climate Modeling
  title: Making Tunable Parameters State-Dependent in Weather and Climate Models with
    Reinforcement Learning
  authors: Pritthijit Nath, Sebastian Schemm, Henry Moss, Peter Haynes, Emily Shuckburgh,
    Mark J. Webb
  year: 2026
  arxiv: 2601.04268v1
  abstract: Weather and climate models rely on parametrisations to represent unresolved
    sub-grid processes. Traditional schemes rely on fixed coefficients that are weakly
    constrained and tuned offline, contributing to persistent biases that limit their
    ability to adapt to the underlying physics. This study presents a framework that
    learns components of parametrisation schemes online as a function of the evolving
    model state using reinforcement learning (RL) and evaluates the resulting RL-driven
    parameter updates across a hierarchy of idealised testbeds spanning a simple climate
    bias correction (SCBC), a radiative-convective equilibrium (RCE), and a zonal
    mean energy balance model (EBM) with both single-agent and federated multi-agent
    settings. Across nine RL algorithms, Truncated Quantile Critics (TQC), Deep Deterministic
    Policy Gradient (DDPG), and Twin Delayed DDPG (TD3) achieved the highest skill
    and the most stable convergence across configurations, with performance assessed
    against a static baseline using area-weighted RMSE, temperature profile and pressure-level
    diagnostics. For the EBM, single-agent RL outperformed static parameter tuning
    with the strongest gains in tropical and mid-latitude bands, while federated RL
    on multi-agent setups enabled geographically specialised control and faster convergence,
    with a six-agent DDPG configuration using frequent aggregation yielding the lowest
    area-weighted RMSE across the tropics and mid-latitudes. The learnt corrections
    were also physically meaningful as agents modulated EBM radiative parameters to
    reduce meridional biases, adjusted RCE lapse rates to match vertical temperature
    errors, and stabilised SCBC heating increments to limit drift. Overall, results
    highlight RL to deliver skilful state-dependent, and regime-aware parametrisations,
    offering a scalable pathway for online learning within numerical models.
  tags:
  - reinforcement-learning
- category: Global Models
  title: 'Searth Transformer: A Transformer Architecture Incorporating Earth''s Geospheric
    Physical Priors for Global Mid-Range Weather Forecasting'
  authors: Tianye Li, Qi Liu, Hao Li, Lei Chen, Wencong Cheng, Fei Zheng, Xiangao
    Xia, Ya Wang, Gang Huang, Weiwei Wang, Xuan Tong, Ziqing Zu, Yi Fang, Shenming
    Fu, Jiang Jiang, Haochen Li, Mingxing Li, Jiangjiang Xia
  year: 2026
  arxiv: 2601.09467v1
  abstract: Accurate global medium-range weather forecasting is fundamental to Earth
    system science. Most existing Transformer-based forecasting models adopt vision-centric
    architectures that neglect the Earth's spherical geometry and zonal periodicity.
    In addition, conventional autoregressive training is computationally expensive
    and limits forecast horizons due to error accumulation. To address these challenges,
    we propose the Shifted Earth Transformer (Searth Transformer), a physics-informed
    architecture that incorporates zonal periodicity and meridional boundaries into
    window-based self-attention for physically consistent global information exchange.
    We further introduce a Relay Autoregressive (RAR) fine-tuning strategy that enables
    learning long-range atmospheric evolution under constrained memory and computational
    budgets. Based on these methods, we develop YanTian, a global medium-range weather
    forecasting model. YanTian achieves higher accuracy than the high-resolution forecast
    of the European Centre for Medium-Range Weather Forecasts and performs competitively
    with state-of-the-art AI models at one-degree resolution, while requiring roughly
    200 times lower computational cost than standard autoregressive fine-tuning. Furthermore,
    YanTian attains a longer skillful forecast lead time for Z500 (10.3 days) than
    HRES (9 days). Beyond weather forecasting, this work establishes a robust algorithmic
    foundation for predictive modeling of complex global-scale geophysical circulation
    systems, offering new pathways for Earth system science.
  tags:
  - transformer
  - physics-informed
- category: Global Models
  title: Efficient Parameter Calibration of Numerical Weather Prediction Models via
    Evolutionary Sequential Transfer Optimization
  authors: Heping Fang, Peng Yang
  year: 2026
  arxiv: 2601.08663v1
  abstract: The configuration of physical parameterization schemes in Numerical Weather
    Prediction (NWP) models plays a critical role in determining the accuracy of the
    forecast. However, existing parameter calibration methods typically treat each
    calibration task as an isolated optimization problem. This approach suffers from
    prohibitive computational costs and necessitates performing iterative searches
    from scratch for each task, leading to low efficiency in sequential calibration
    scenarios. To address this issue, we propose the SEquential Evolutionary Transfer
    Optimization (SEETO) algorithm driven by the representations of the meteorological
    state. First, to accurately measure the physical similarity between calibration
    tasks, a meteorological state representation extractor is introduced to map high-dimensional
    meteorological fields into latent representations. Second, given the similarity
    in the latent space, a bi-level adaptive knowledge transfer mechanism is designed.
    At the solution level, superior populations from similar historical tasks are
    reused to achieve a "warm start" for optimization. At the model level, an ensemble
    surrogate model based on source task data is constructed to assist the search,
    employing an adaptive weighting mechanism to dynamically balance the contributions
    of source domain knowledge and target domain data. Extensive experiments across
    10 distinct calibration tasks, which span varying source-target similarities,
    highlight SEETO's superior efficiency. Under a strict budget of 20 expensive evaluations,
    SEETO achieves a 6% average improvement in Hypervolume (HV) over two state-of-the-art
    baselines. Notably, to match SEETO's performance at this stage, the comparison
    algorithms would require an average of 64% and 28% additional evaluations, respectively.
    This presents a new paradigm for the efficient and accurate automated calibration
    of NWP model parameters.
  tags: []
- category: Other
  title: 'Hybrid SARIMA LSTM Model for Local Weather Forecasting: A Residual Learning
    Approach for Data Driven Meteorological Prediction'
  authors: Shreyas Rajeev, Karthik Mudenahalli Ashoka, Amit Mallappa Tiparaddi
  year: 2026
  arxiv: 2601.07951v1
  abstract: Accurately forecasting long-term atmospheric variables remains a defining
    challenge in meteorological science due to the chaotic nature of atmospheric systems.
    Temperature data represents a complex superposition of deterministic cyclical
    climate forces and stochastic, short-term fluctuations. While planetary mechanics
    drive predictable seasonal periodicities, rapid meteorological changes such as
    thermal variations, pressure anomalies, and humidity shifts introduce nonlinear
    volatilities that defy simple extrapolation. Historically, the Seasonal Autoregressive
    Integrated Moving Average (SARIMA) model has been the standard for modeling historical
    weather data, prized for capturing linear seasonal trends. However, SARIMA operates
    under strict assumptions of stationarity, failing to capture abrupt, nonlinear
    transitions. This leads to systematic residual errors, manifesting as the under-prediction
    of sudden spikes or the over-smoothing of declines. Conversely, Deep Learning
    paradigms, specifically Long Short-Term Memory (LSTM) networks, demonstrate exceptional
    efficacy in handling intricate time-series data. By utilizing memory gates, LSTMs
    learn complex nonlinear dependencies. Yet, LSTMs face instability in open-loop
    forecasting; without ground truth feedback, minor deviations compound recursively,
    causing divergence. To resolve these limitations, we propose a Hybrid SARIMA-LSTM
    architecture. This framework employs a residual-learning strategy to decompose
    temperature into a predictable climate component and a nonlinear weather component.
    The SARIMA unit models the robust, long-term seasonal trend, while the LSTM is
    trained exclusively on the residuals the nonlinear errors SARIMA fails to capture.
    By fusing statistical stability with neural plasticity, this hybrid approach minimizes
    error propagation and enhances long-horizon accuracy.
  tags:
  - recurrent
- category: Downscaling
  title: Zero-Shot Statistical Downscaling via Diffusion Posterior Sampling
  authors: Ruian Tie, Wenbo Xiong, Zhengyu Shi, Xinyu Su, Chenyu jiang, Libo Wu, Hao
    Li
  year: 2026
  arxiv: 2601.21760v1
  abstract: Conventional supervised climate downscaling struggles to generalize to
    Global Climate Models (GCMs) due to the lack of paired training data and inherent
    domain gaps relative to reanalysis. Meanwhile, current zero-shot methods suffer
    from physical inconsistencies and vanishing gradient issues under large scaling
    factors. We propose Zero-Shot Statistical Downscaling (ZSSD), a zero-shot framework
    that performs statistical downscaling without paired data during training. ZSSD
    leverages a Physics-Consistent Climate Prior learned from reanalysis data, conditioned
    on geophysical boundaries and temporal information to enforce physical validity.
    Furthermore, to enable robust inference across varying GCMs, we introduce Unified
    Coordinate Guidance. This strategy addresses the vanishing gradient problem in
    vanilla DPS and ensures consistency with large-scale fields. Results show that
    ZSSD significantly outperforms existing zero-shot baselines in 99th percentile
    errors and successfully reconstructs complex weather events, such as tropical
    cyclones, across heterogeneous GCMs.
  tags: []
- category: Data Assimilation
  title: 'SENDAI: A Hierarchical Sparse-measurement, EfficieNt Data AssImilation Framework'
  authors: Xingyue Zhang, Yuxuan Bao, Mars Liyao Gao, J. Nathan Kutz
  year: 2026
  arxiv: 2601.21664v1
  abstract: Bridging the gap between data-rich training regimes and observation-sparse
    deployment conditions remains a central challenge in spatiotemporal field reconstruction,
    particularly when target domains exhibit distributional shifts, heterogeneous
    structure, and multi-scale dynamics absent from available training data. We present
    SENDAI, a hierarchical Sparse-measurement, EfficieNt Data AssImilation Framework
    that reconstructs full spatial states from hyper sparse sensor observations by
    combining simulation-derived priors with learned discrepancy corrections. We demonstrate
    the performance on satellite remote sensing, reconstructing MODIS (Moderate Resolution
    Imaging Spectroradiometer) derived vegetation index fields across six globally
    distributed sites. Using seasonal periods as a proxy for domain shift, the framework
    consistently outperforms established baselines that require substantially denser
    observations -- SENDAI achieves a maximum SSIM improvement of 185% over traditional
    baselines and a 36% improvement over recent high-frequency-based methods. These
    gains are particularly pronounced for landscapes with sharp boundaries and sub-seasonal
    dynamics; more importantly, the framework effectively preserves diagnostically
    relevant structures -- such as field topologies, land cover discontinuities, and
    spatial gradients. By yielding corrections that are more structurally and spectrally
    separable, the reconstructed fields are better suited for downstream inference
    of indirectly observed variables. The results therefore highlight a lightweight
    and operationally viable framework for sparse-measurement reconstruction that
    is applicable to physically grounded inference, resource-limited deployment, and
    real-time monitor and control.
  tags: []
- category: Global Models
  title: 'Learning to Advect: A Neural Semi-Lagrangian Architecture for Weather Forecasting'
  authors: Carlos A. Pereira, Stéphane Gaudreault, Valentin Dallerit, Christopher
    Subich, Shoyon Panday, Siqi Wei, Sasa Zhang, Siddharth Rout, Eldad Haber, Raymond
    J. Spiteri, David Millard, Emilia Diaconescu
  year: 2026
  arxiv: 2601.21151v1
  abstract: Recent machine-learning approaches to weather forecasting often employ
    a monolithic architecture, where distinct physical mechanisms (advection, transport),
    diffusion-like mixing, thermodynamic processes, and forcing are represented implicitly
    within a single large network. This representation is particularly problematic
    for advection, where long-range transport must be treated with expensive global
    interaction mechanisms or through deep, stacked convolutional layers. To mitigate
    this, we present PARADIS, a physics-inspired global weather prediction model that
    imposes inductive biases on network behavior through a functional decomposition
    into advection, diffusion, and reaction blocks acting on latent variables. We
    implement advection through a Neural Semi-Lagrangian operator that performs trajectory-based
    transport via differentiable interpolation on the sphere, enabling end-to-end
    learning of both the latent modes to be transported and their characteristic trajectories.
    Diffusion-like processes are modeled through depthwise-separable spatial mixing,
    while local source terms and vertical interactions are modeled via pointwise channel
    interactions, enabling operator-level physical structure. PARADIS provides state-of-the-art
    forecast skill at a fraction of the training cost. On ERA5-based benchmarks, the
    1 degree PARADIS model, with a total training cost of less than a GPU month, meets
    or exceeds the performance of 0.25 degree traditional and machine-learning baselines,
    including the ECMWF HRES forecast and DeepMind's GraphCast.
  tags: []
- category: Nowcasting
  title: 'StormDiT: A generative AI model bridges the 2-6 hour ''gray zone'' in precipitation
    nowcasting'
  authors: Haofei Sun, Yunfan Yang, Wei Han, Wei Huang, Huaguan Chen, Zhiqiu Gao,
    Zeting Li, Zhaoyang Huo, Zeyi Niu
  year: 2026
  arxiv: 2601.20342v1
  abstract: Accurate short-term warnings for extreme precipitation are critical for
    global disaster mitigation but are hindered by a persistent predictability barrier
    at the 2-6 hour horizon -- the "nowcasting gray zone." In this window, traditional
    observation-based extrapolation fails due to error accumulation, while numerical
    weather prediction is computationally too slow to resolve storm-scale dynamics.
    Recent generative AI approaches attempt to bridge this gap by decomposing precipitation
    into separate deterministic advection and stochastic diffusion components. However,
    this decomposition can sever fundamental causal links between entangled atmospheric
    processes, such as the dynamic initiation of convection triggered by boundary
    advection. Here we present StormDiT, a unified generative model that treats weather
    evolution as a holistic spatiotemporal problem, learning the coupled physics of
    the gray zone without human-imposed structural priors. Trained on a massive dataset
    of 7,720 precipitation events from China, our model achieves a breakthrough in
    long-horizon stability. On a heavy-rainfall test set, it maintains skillful prediction
    for strong convection ($\ge$ 35 dBZ) with a Critical Success Index (CSI) near
    0.2 across the full 6-hour forecast at 6-minute resolution. Crucially, the model
    exhibits superior probabilistic calibration, accurately quantifying operational
    risks. On the public SEVIR benchmark, our unified paradigm more than doubles the
    state-of-the-art 1-hour performance for heavy rain and establishes the first robust
    baseline for 3-hour forecasting. Furthermore, interpretability analysis reveals
    that the model attends to non-local physical precursors, such as outflow boundaries,
    explicitly validating its emergent understanding of convective organization.
  tags:
  - probabilistic
- category: Data Assimilation
  title: 'Cheap2Rich: A Multi-Fidelity Framework for Data Assimilation and System
    Identification of Multiscale Physics -- Rotating Detonation Engines'
  authors: Yuxuan Bao, Jan Zajac, Megan Powers, Venkat Raman, J. Nathan Kutz
  year: 2026
  arxiv: 2601.20295v1
  abstract: 'Bridging the sim2real gap between computationally inexpensive models
    and complex physical systems remains a central challenge in machine learning applications
    to engineering problems, particularly in multi-scale settings where reduced-order
    models typically capture only dominant dynamics. In this work, we present Cheap2Rich,
    a multi-scale data assimilation framework that reconstructs high-fidelity state
    spaces from sparse sensor histories by combining a fast low-fidelity prior with
    learned, interpretable discrepancy corrections. We demonstrate the performance
    on rotating detonation engines (RDEs), a challenging class of systems that couple
    detonation-front propagation with injector-driven unsteadiness, mixing, and stiff
    chemistry across disparate scales. Our approach successfully reconstructs high-fidelity
    RDE states from sparse measurements while isolating physically meaningful discrepancy
    dynamics associated with injector-driven effects. The results highlight a general
    multi-fidelity framework for data assimilation and system identification in complex
    multi-scale systems, enabling rapid design exploration and real-time monitoring
    and control while providing interpretable discrepancy dynamics. Code for this
    project is is available at: github.com/kro0l1k/Cheap2Rich.'
  tags: []
- category: Global Models
  title: Demystifying Data-Driven Probabilistic Medium-Range Weather Forecasting
  authors: Jean Kossaifi, Nikola Kovachki, Morteza Mardani, Daniel Leibovici, Suman
    Ravuri, Ira Shokar, Edoardo Calvello, Mohammad Shoaib Abbas, Peter Harrington,
    Ashay Subramaniam, Noah Brenowitz, Boris Bonev, Wonmin Byeon, Karsten Kreis, Dale
    Durran, Arash Vahdat, Mike Pritchard, Jan Kautz
  year: 2026
  arxiv: 2601.18111v1
  abstract: The recent revolution in data-driven methods for weather forecasting has
    lead to a fragmented landscape of complex, bespoke architectures and training
    strategies, obscuring the fundamental drivers of forecast accuracy. Here, we demonstrate
    that state-of-the-art probabilistic skill requires neither intricate architectural
    constraints nor specialized training heuristics. We introduce a scalable framework
    for learning multi-scale atmospheric dynamics by combining a directly downsampled
    latent space with a history-conditioned local projector that resolves high-resolution
    physics. We find that our framework design is robust to the choice of probabilistic
    estimator, seamlessly supporting stochastic interpolants, diffusion models, and
    CRPS-based ensemble training. Validated against the Integrated Forecasting System
    and the deep learning probabilistic model GenCast, our framework achieves statistically
    significant improvements on most of the variables. These results suggest scaling
    a general-purpose model is sufficient for state-of-the-art medium-range prediction,
    eliminating the need for tailored training recipes and proving effective across
    the full spectrum of probabilistic frameworks.
  tags:
  - diffusion
  - probabilistic
- category: Climate Modeling
  title: 'Decision-oriented benchmarking to transform AI weather forecast access:
    Application to the Indian monsoon'
  authors: Rajat Masiwal, Colin Aitken, Adam Marchakitus, Mayank Gupta, Katherine
    Kowal, Hamid A. Pahlavan, Tyler Yang, Y. Qiang Sun, Michael Kremer, Amir Jina,
    William R. Boos, Pedram Hassanzadeh
  year: 2026
  arxiv: 2602.03767v1
  abstract: Artificial intelligence weather prediction (AIWP) models now often outperform
    traditional physics-based models on common metrics while requiring orders-of-magnitude
    less computing resources and time. Open-access AIWP models thus hold promise as
    transformational tools for helping low- and middle-income populations make decisions
    in the face of high-impact weather shocks. Yet, current approaches to evaluating
    AIWP models focus mainly on aggregated meteorological metrics without considering
    local stakeholders' needs in decision-oriented, operational frameworks. Here,
    we introduce such a framework that connects meteorology, AI, and social sciences.
    As an example, we apply it to the 150-year-old problem of Indian monsoon forecasting,
    focusing on benefits to rain-fed agriculture, which is highly susceptible to climate
    change. AIWP models skillfully predict an agriculturally relevant onset index
    at regional scales weeks in advance when evaluated out-of-sample using deterministic
    and probabilistic metrics. This framework informed a government-led effort in
    2025 to send 38 million Indian farmers AI-based monsoon onset forecasts, which
    captured an unusual weeks-long pause in monsoon progression. This decision-oriented
    benchmarking framework provides a key component of a blueprint for harnessing
    the power of AIWP models to help large vulnerable populations adapt to weather
    shocks in the face of climate variability and change.
  tags:
  - physics-informed
  - probabilistic
- category: Downscaling
  title: Downscaling land surface temperature data using edge detection and block-diagonal
    Gaussian process regression
  authors: Sanjit Dandapanthula, Margaret Johnson, Madeleine Pascolini-Campbell, Glynn
    Hulley, Mikael Kuusela
  year: 2026
  arxiv: 2602.02813v1
  abstract: Accurate and high-resolution estimation of land surface temperature (LST)
    is crucial in estimating evapotranspiration, a measure of plant water use and
    a central quantity in agricultural applications. In this work, we develop a novel
    statistical method for downscaling LST data obtained from NASA's ECOSTRESS mission,
    using high-resolution data from the Landsat 8 mission as a proxy for modeling
    agricultural field structure. Using the Landsat data, we identify the boundaries
    of agricultural fields through edge detection techniques, allowing us to capture
    the inherent block structure present in the spatial domain. We propose a block-diagonal
    Gaussian process (BDGP) model that captures the spatial structure of the agricultural
    fields, leverages independence of LST across fields for computational tractability,
    and accounts for the change of support present in ECOSTRESS observations. We use
    the resulting BDGP model to perform Gaussian process regression and obtain high-resolution
    estimates of LST from ECOSTRESS data, along with uncertainty quantification. Our
    results demonstrate the practicality of the proposed method in producing reliable
    high-resolution LST estimates, with potential applications in agriculture, urban
    planning, and climate studies.
  tags:
  - probabilistic
- category: Data Assimilation
  title: 'On a system of equations arising in meteorology: Well-posedness and data
    assimilation'
  authors: Eduard Feireisl, Piotr Gwiazda, Agnieszka Świerczewska-Gwiazda
  year: 2026
  arxiv: 2602.02328v1
  abstract: Data assimilation plays a crucial role in modern weather prediction, providing
    a systematic way to incorporate observational data into complex dynamical models.
    The paper addresses continuous data assimilation for a model arising as a singular
    limit of the three-dimensional compressible Navier-Stokes-Fourier system with
    rotation driven by temperature gradient. The limit system preserves the essential
    physical mechanisms of the original model, while exhibiting a reduced, effectively
    two-and-a-half-dimensional structure. This simplified framework allows for a rigorous
    analytical study of the data assimilation process while maintaining a direct physical
    connection to the full compressible model. We establish well posedness of global-in-time
    solutions and a compact trajectory attractor, followed by the stability and convergence
    results for the nudging scheme applied to the limiting system. Finally, we demonstrate
    how these results can be combined with a relative entropy argument to extend the
    assimilation framework to the full three-dimensional compressible setting, thereby
    establishing a rigorous connection between the reduced and physically complete
    models.
  tags: []
- category: Nowcasting
  title: 'WADEPre: A Wavelet-based Decomposition Model for Extreme Precipitation Nowcasting
    with Multi-Scale Learning'
  authors: Baitian Liu, Haiping Zhang, Huiling Yuan, Dongjing Wang, Ying Li, Feng
    Chen, Hao Wu
  year: 2026
  arxiv: 2602.02096v1
  abstract: 'The heavy-tailed nature of precipitation intensity impedes precise precipitation
    nowcasting. Standard models that optimize pixel-wise losses are prone to regression-to-the-mean
    bias, which blurs extreme values. Existing Fourier-based methods also lack the
    spatial localization needed to resolve transient convective cells. To overcome
    these intrinsic limitations, we propose WADEPre, a wavelet-based decomposition
    model for extreme precipitation that transitions the modeling into the wavelet
    domain. By leveraging the Discrete Wavelet Transform for explicit decomposition,
    WADEPre employs a dual-branch architecture: an Approximation Network to model
    stable, low-frequency advection, isolating deterministic trends from statistical
    bias, and a spatially localized Detail Network to capture high-frequency stochastic
    convection, resolving transient singularities and preserving sharp boundaries.
    A subsequent Refiner module then dynamically reconstructs these decoupled multi-scale
    components into the final high-fidelity forecast. To address optimization instability,
    we introduce a multi-scale curriculum learning strategy that progressively shifts
    supervision from coarse scales to fine-grained details. Extensive experiments
    on the SEVIR and Shanghai Radar datasets demonstrate that WADEPre achieves state-of-the-art
    performance, yielding significant improvements in capturing extreme thresholds
    and maintaining structural fidelity. Our code is available at https://github.com/sonderlau/WADEPre.'
  tags: []
  github: https://github.com/sonderlau/WADEPre
- category: Other
  title: 'EMFormer: Efficient Multi-Scale Transformer for Accumulative Context Weather
    Forecasting'
  authors: Hao Chen, Tao Han, Jie Zhang, Song Guo, Fenghua Ling, Lei Bai
  year: 2026
  arxiv: 2602.01194v1
  abstract: Long-term weather forecasting is critical for socioeconomic planning and
    disaster preparedness. While recent approaches employ finetuning to extend prediction
    horizons, they remain constrained by the issues of catastrophic forgetting, error
    accumulation, and high training overhead. To address these limitations, we present
    a novel pipeline across pretraining, finetuning and forecasting to enhance long-context
    modeling while reducing computational overhead. First, we introduce an Efficient
    Multi-scale Transformer (EMFormer) to extract multi-scale features through a single
    convolution in both training and inference. Based on the new architecture, we
    further employ an accumulative context finetuning to improve temporal consistency
    without degrading short-term accuracy. Additionally, we propose a composite loss
    that dynamically balances different terms via a sinusoidal weighting, thereby
    adaptively guiding the optimization trajectory throughout pretraining and finetuning.
    Experiments show that our approach achieves strong performance in weather forecasting
    and extreme event prediction, substantially improving long-term forecast accuracy.
    Moreover, EMFormer demonstrates strong generalization on vision benchmarks (ImageNet-1K
    and ADE20K) while delivering a 5.69x speedup over conventional multi-scale modules.
  tags:
  - transformer
- category: Global Models
  title: Universal Diffusion-Based Probabilistic Downscaling
  authors: Roberto Molinaro, Niall Siegenheim, Henry Martin, Mark Frey, Niels Poulsen,
    Philipp Seitz, Marvin Vincent Gabler
  year: 2026
  arxiv: 2602.11893v1
  abstract: We introduce a universal diffusion-based downscaling framework that lifts
    deterministic low-resolution weather forecasts into probabilistic high-resolution
    predictions without any model-specific fine-tuning. A single conditional diffusion
    model is trained on paired coarse-resolution inputs (~25 km resolution) and high-resolution
    regional reanalysis targets (~5 km resolution), and is applied in a fully zero-shot
    manner to deterministic forecasts from heterogeneous upstream weather models.
    Focusing on near-surface variables, we evaluate probabilistic forecasts against
    independent in situ station observations over lead times up to 90 h. Across a
    diverse set of AI-based and numerical weather prediction (NWP) systems, the ensemble
    mean of the downscaled forecasts consistently improves upon each model's own raw
    deterministic forecast, and substantially larger gains are observed in probabilistic
    skill as measured by CRPS. These results demonstrate that diffusion-based downscaling
    provides a scalable, model-agnostic probabilistic interface for enhancing spatial
    resolution and uncertainty representation in operational weather forecasting pipelines.
  tags:
  - diffusion
  - probabilistic
- category: Ensembles
  title: 'PuYun-LDM: A Latent Diffusion Model for High-Resolution Ensemble Weather
    Forecasts'
  authors: Lianjun Wu, Shengchen Zhu, Yuxuan Liu, Liuyu Kai, Xiaoduan Feng, Duomin
    Wang, Wenshuo Liu, Jingxuan Zhang, Kelvin Li, Bin Wang
  year: 2026
  arxiv: 2602.11807v1
  abstract: Latent diffusion models (LDMs) suffer from limited diffusability in high-resolution
    (<=0.25°) ensemble weather forecasting, where diffusability characterizes how
    easily a latent data distribution can be modeled by a diffusion process. Unlike
    natural image fields, meteorological fields lack task-agnostic foundation models
    and explicit semantic structures, making VFM-based regularization inapplicable.
    Moreover, existing frequency-based approaches impose identical spectral regularization
    across channels under a homogeneity assumption, which leads to uneven regularization
    strength under the inter-variable spectral heterogeneity in multivariate meteorological
    data. To address these challenges, we propose a 3D Masked AutoEncoder (3D-MAE)
    that encodes weather-state evolution features as an additional conditioning for
    the diffusion model, together with a Variable-Aware Masked Frequency Modeling
    (VA-MFM) strategy that adaptively selects thresholds based on the spectral energy
    distribution of each variable. Together, we propose PuYun-LDM, which enhances
    latent diffusability and achieves superior performance to ENS at short lead times
    while remaining comparable to ENS at longer horizons. PuYun-LDM generates a 15-day
    global forecast with a 6-hour temporal resolution in five minutes on a single
    NVIDIA H200 GPU, while ensemble forecasts can be efficiently produced in parallel.
  tags:
  - diffusion
  - foundation-model
- category: Other
  title: Exploring Novel Data Storage Approaches for Large-Scale Numerical Weather
    Prediction
  authors: Nicolau Manubens Gil
  year: 2026
  arxiv: 2602.17610v1
  abstract: Driven by scientific and industry ambition, HPC and AI applications such
    as operational Numerical Weather Prediction (NWP) require processing and storing
    ever-increasing data volumes as fast as possible. Whilst POSIX distributed file
    systems and NVMe SSDs are currently a common HPC storage configuration providing
    I/O to applications, new storage solutions have proliferated or gained traction
    over the last decade with potential to address performance limitations POSIX file
    systems manifest at scale for certain I/O workloads.   This work has primarily
    aimed to assess the suitability and performance of two object storage systems
    -namely DAOS and Ceph- for the ECMWF's operational NWP as well as for HPC and
    AI applications in general. New software-level adapters have been developed which
    enable the ECMWF's NWP to leverage these systems, and extensive I/O benchmarking
    has been conducted on a few computer systems, comparing the performance delivered
    by the evaluated object stores to that of equivalent Lustre file system deployments
    on the same hardware. Challenges of porting to object storage and its benefits
    with respect to the traditional POSIX I/O approach have been discussed and, where
    possible, domain-agnostic performance analysis has been conducted, leading to
    insight also of relevance to I/O practitioners and the broader HPC community.   DAOS
    and Ceph have both demonstrated excellent performance, but DAOS stood out relative
    to Ceph and Lustre, providing superior scalability and flexibility for applications
    to perform I/O at scale as desired. This sets a promising outlook for DAOS and
    object storage, which might see greater adoption at HPC centres in the years to
    come, although not necessarily implying a shift away from POSIX-like I/O.
  tags: []
- category: Data Assimilation
  title: Preconditioned Adjoint Data Assimilation for Two-Dimensional Decaying Isotropic
    Turbulence
  authors: Hongyi Ke, Zejian You, Qi Wang
  year: 2026
  arxiv: 2602.14016v1
  abstract: 'Adjoint-based data assimilation for turbulent Navier-Stokes flows is
    fundamentally limited by the behavior of the adjoint dynamics: in backward time,
    adjoint fields exhibit exponential growth and become increasingly dominated by
    small-scale structures, severely degrading reconstruction of the initial condition
    from sparse measurements. We demonstrate that the relative weighting of spectral
    components in the adjoint formulation can be systematically controlled by redefining
    the inner product under which the adjoint operator is defined. The inverse problem
    is formulated as a constrained minimization in which a cost functional measures
    the mismatch between model predictions and observations, and the adjoint equations
    provide the gradient with respect to the initial velocity field. Redefining the
    forward-adjoint duality through a Fourier-space weighting kernel preconditions
    the optimization and is mathematically equivalent to changing the representation
    of the control variable or, alternatively, introducing a smoothing operation on
    the governing dynamics. Specific kernel choices correspond to fractional integration
    or diffusion operators applied to the initial condition. Among these, exponential
    kernels provide effective regularization by suppressing high-wavenumber contributions
    while preserving large-scale coherence, leading to improved reconstruction across
    scales. A statistical analysis of an ensemble of adjoint fields from different
    turbulent realizations reveals scale-dependent backward growth rates, explaining
    the instability of the standard formulation and clarifying the mechanism by which
    the proposed preconditioning attenuates incoherent small-scale amplification.'
  tags: []
- category: Ensembles
  title: Distillation and Interpretability of Ensemble Forecasts of ENSO Phase using
    Entropic Learning
  authors: Michael Groom, Davide Bassetti, Illia Horenko, Terence J. O'Kane
  year: 2026
  arxiv: 2602.16857v1
  abstract: This paper introduces a distillation framework for an ensemble of entropy-optimal
    Sparse Probabilistic Approximation (eSPA) models, trained exclusively on satellite-era
    observational and reanalysis data to predict ENSO phase up to 24 months in advance.
    While eSPA ensembles yield state-of-the-art forecast skill, they are harder to
    interpret than individual eSPA models. We show how to compress the ensemble into
    a compact set of "distilled" models by aggregating the structure of only those
    ensemble members that make correct predictions. This process yields a single,
    diagnostically tractable model for each forecast lead time that preserves forecast
    performance while also enabling diagnostics that are impractical to implement
    on the full ensemble.   An analysis of the regime persistence of the distilled
    model "superclusters", as well as cross-lead clustering consistency, shows that
    the discretised system accurately captures the spatiotemporal dynamics of ENSO.
    By considering the effective dimension of the feature importance vectors, the
    complexity of the input space required for correct ENSO phase prediction is shown
    to peak when forecasts must cross the boreal spring predictability barrier. Spatial
    importance maps derived from the feature importance vectors are introduced to
    identify where predictive information resides in each field and are shown to include
    known physical precursors at certain lead times. Case studies of key events are
    also presented, showing how fields reconstructed from distilled model centroids
    trace the evolution from extratropical and inter-basin precursors to the mature
    ENSO state. Overall, the distillation framework enables a rigorous investigation
    of long-range ENSO predictability that complements real-time data-driven operational
    forecasts.
  tags:
  - probabilistic
- category: Data Assimilation
  title: Efficient Real-Time Adaptation of ROMs for Unsteady Flows Using Data Assimilation
  authors: Ismaël Zighed, Andrea Nóvoa, Luca Magri, Taraneh Sayadi
  year: 2026
  arxiv: 2602.23188v1
  abstract: 'We propose an efficient retraining strategy for a parameterized Reduced
    Order Model (ROM) that attains accuracy comparable to full retraining while requiring
    only a fraction of the computational time and relying solely on sparse observations
    of the full system. The architecture employs an encode-process-decode structure:
    a Variational Autoencoder (VAE) to perform dimensionality reduction, and a transformer
    network to evolve the latent states and model the dynamics. The ROM is parameterized
    by an external control variable, the Reynolds number in the Navier-Stokes setting,
    with the transformer exploiting attention mechanisms to capture both temporal
    dependencies and parameter effects. The probabilistic VAE enables stochastic sampling
    of trajectory ensembles, providing predictive means and uncertainty quantification
    through the first two moments. After initial training on a limited set of dynamical
    regimes, the model is adapted to out-of-sample parameter regions using only sparse
    data. Its probabilistic formulation naturally supports ensemble generation, which
    we employ within an ensemble Kalman filtering framework to assimilate data and
    reconstruct full-state trajectories from minimal observations. We further show
    that, for the dynamical system considered, the dominant source of error in out-of-sample
    forecasts stems from distortions of the latent manifold rather than changes in
    the latent dynamics. Consequently, retraining can be limited to the autoencoder,
    allowing for a lightweight, computationally efficient, real-time adaptation procedure
    with very sparse fine-tuning data.'
  tags:
  - transformer
  - variational
  - probabilistic
- category: Climate Modeling
  title: 'PICASO 4.0: Clouds and Photochemistry in Climate Models of Brown Dwarfs
    and Exoplanets'
  authors: James Mang, Natasha E. Batalha, Caroline V. Morley, Nicholas F. Wogan,
    Sagnick Mukherjee, Channon Visscher, Mark S. Marley, Jonathan J. Fortney, Katy
    L. Chubb, Peter Gao, Isaac Malsky
  year: 2026
  arxiv: 2602.22468v1
  abstract: We present a major update to the open-source atmospheric modeling package
    \texttt{PICASO}, designed for simulating the thermal structure and spectra of
    hydrogen-rich atmospheres of brown dwarfs and exoplanets. This release, \texttt{PICASO
    4.0}, expands upon the existing radiative-convective equilibrium model framework
    by incorporating several new capabilities. Key additions include the integration
    of \texttt{Virga} for self-consistent cloud modeling, new flexible treatments
    for rainout and cold trapping of volatile species, and support for photochemistry.
    We also introduce a parameterized energy injection scheme to simulate additional
    external or internal heating processes. These features are motivated by lessons
    from recent JWST observations that reveal the prevalence of non-equilibrium chemistry
    and clouds. We benchmark the new functionalities against previously published
    results in the literature, including the Sonora Diamondback grid, energy injected
    atmospheres, patchy cloud models, and other photochemical models of WASP-39b.
    \texttt{PICASO} continues to be actively developed as an open-source package aimed
    at enabling reproducible, community-driven atmospheric modeling of all substellar
    objects.
  tags: []
- category: Data Assimilation
  title: 'LEVDA: Latent Ensemble Variational Data Assimilation via Differentiable
    Dynamics'
  authors: Phillip Si, Peng Chen
  year: 2026
  arxiv: 2602.19406v1
  abstract: Long-range geophysical forecasts are fundamentally limited by chaotic
    dynamics and numerical errors. While data assimilation can mitigate these issues,
    classical variational smoothers require computationally expensive tangent-linear
    and adjoint models. Conversely, recent efficient latent filtering methods often
    enforce weak trajectory-level constraints and assume fixed observation grids.
    To bridge this gap, we propose Latent Ensemble Variational Data Assimilation (LEVDA),
    an ensemble-space variational smoother that operates in the low-dimensional latent
    space of a pretrained differentiable neural dynamics surrogate. By performing
    four-dimensional ensemble-variational (4DEnVar) optimization within an ensemble
    subspace, LEVDA jointly assimilates states and unknown parameters without the
    need for adjoint code or auxiliary observation-to-latent encoders. Leveraging
    the fully differentiable, continuous-in-time-and-space nature of the surrogate,
    LEVDA naturally accommodates highly irregular sampling at arbitrary spatiotemporal
    locations. Across three challenging geophysical benchmarks, LEVDA matches or outperforms
    state-of-the-art latent filtering baselines under severe observational sparsity
    while providing more reliable uncertainty quantification. Simultaneously, it achieves
    substantially improved assimilation accuracy and computational efficiency compared
    to full-state 4DEnVar.
  tags:
  - probabilistic
- category: Global Models
  title: On Using Medium-Range Ensemble Forecasts for Storm Transposition of Synoptic-Scale
    Systems in Probable Maximum Precipitation Estimation
  authors: Mathieu Mure-Ravaud
  year: 2026
  arxiv: 2602.19233v1
  abstract: Most methods for estimating probable maximum precipitation (PMP) -- the
    greatest depth of precipitation that is physically possible over a given area
    and duration -- rely on storm transposition (ST), the process of transporting
    a storm, either historically observed or simulated, from its original location
    to a target basin. Existing ST approaches, whether classical or physically based,
    involve assumptions and manipulations that can introduce inconsistencies, leaving
    the physical validity of the transposed storm uncertain. In this study, the internal
    variability leveraging (IVL) approach is used to transpose an atmospheric river
    cluster that affected the U.S. West Coast during 20-29 October 2021. Steering
    the storm toward the target basin and determining its transposition region are
    achieved by considering an ensemble of plausible storm evolutions and trajectories
    obtained from archived ECMWF medium-range forecasts. The Willamette River and
    Nass River watersheds, located approximately 6 deg N, 2 deg W and 16 deg N, 8
    deg W, respectively, from the area most affected by the observed precipitation,
    were selected as target basins. For each basin, the IVL realization yielding the
    largest 24-h basin-average precipitation depth was identified, and the initial
    and boundary condition shifting method was subsequently applied to further enhance
    its impact, producing 24-h precipitation depths of 119 mm for the Willamette and
    98 mm for the Nass.
  tags: []
- category: Data Assimilation
  title: Accurate and Efficient Hybrid-Ensemble Atmospheric Data Assimilation in Latent
    Space with Uncertainty Quantification
  authors: Hang Fan, Juan Nathaniel, Yi Xiao, Ce Bian, Fenghua Ling, Ben Fei, Lei
    Bai, Pierre Gentine
  year: 2026
  arxiv: 2603.04395v1
  abstract: Data assimilation (DA) combines model forecasts and observations to estimate
    the optimal state of the atmosphere with its uncertainty, providing initial conditions
    for weather prediction and reanalyses for climate research. Yet, existing traditional
    and machine-learning DA methods struggle to achieve accuracy, efficiency and uncertainty
    quantification simultaneously. Here, we propose HLOBA (Hybrid-Ensemble Latent
    Observation-Background Assimilation), a three-dimensional hybrid-ensemble DA method
    that operates in an atmospheric latent space learned via an autoencoder (AE).
    HLOBA maps both model forecasts and observations into a shared latent space via
    the AE encoder and an end-to-end Observation-to-Latent-space mapping network (O2Lnet),
    respectively, and fuses them through a Bayesian update with weights inferred from
    time-lagged ensemble forecasts. Both idealized and real-observation experiments
    demonstrate that HLOBA matches dynamically constrained four-dimensional DA methods
    in both analysis and forecast skill, while achieving end-to-end inference-level
    efficiency and theoretical flexibility applies to any forecasting model. Moreover,
    by exploiting the error decorrelation property of latent variables, HLOBA enables
    element-wise uncertainty estimates for its latent analysis and propagates them
    to model space via the decoder. Idealized experiments show that this uncertainty
    highlights large-error regions and captures their seasonal variability.
  tags:
  - probabilistic
- category: Climate Modeling
  title: Climate Downscaling with Stochastic Interpolants (CDSI)
  authors: Erik Larsson, Ramon Fuentes-Franco, Mikhail Ivanov, Fredrik Lindsten
  year: 2026
  arxiv: 2603.03838v1
  abstract: Global climate projections rely on computationally demanding Earth System
    Models (ESMs), which are typically limited to coarse spatial resolutions due to
    their high cost. To obtain high-resolution projections for regions of interest,
    it is common to use Regional Climate Models (RCMs), which are driven by data produced
    by ESMs as boundary conditions. While more efficient than running ESMs at fine
    resolution, RCMs remain expensive and restrict the size of ensemble simulations.
    Inspired by recent advances in probabilistic machine learning for weather and
    climate, we introduce a data-driven climate downscaling method based on stochastic
    interpolants. Our approach efficiently transforms coarse ESM output into high-resolution
    regional climate projections at a fraction of the computational cost of traditional
    RCMs. Through extensive validation, we demonstrate that our method generates accurate
    regional ensembles, enabling both improved uncertainty quantification and broader
    use of high-resolution climate information.
  tags:
  - probabilistic
- category: Climate Modeling
  title: The Effect of Planetary Rotation Period on Clouds in a Global Climate Model
    with a Bin Microphysics Scheme
  authors: Huanzhou Yang, Eric T. Wolf, Cheng-Cheng Liu, Yunqian Zhu, Owen B. Toon,
    Dorian S. Abbot
  year: 2026
  arxiv: 2603.03767v1
  abstract: Clouds are the largest source of uncertainty in climate simulations. For
    exoplanets, cloud simulation is particularly challenging because of the lack of
    observational data to tune parameterized cloud models. Here we apply Community
    Aerosol and Radiation Model for Atmospheres (CARMA), a size-resolved bin cloud
    microphysics model, to the atmospheric global climate model Community Atmosphere
    Model (CAM6) and simulate exoplanets with a range of planetary rotation rates.
    CARMA produces fewer liquid clouds than the native CAM6 parameterized cloud microphysics
    scheme (Morrison-Gettelman two-moment microphysics, MG), more ice clouds, and
    a significantly different ice cloud size distribution. Overall, this leads to
    a decrease in the magnitude of the net CRE by 4-10 $W/m^2$, which is unlikely
    to change the determination of habitability from a climate perspective in most
    cases. The difference in ice cloud size distribution is likely to strongly affect
    transmission spectral retrievals. Our work confirms that the MG parameterized
    cloud microphysics scheme can produce reasonable climate simulation when extrapolated
    to some exoplanet contexts and highlights the value of resolved cloud microphysics
    for evaluating parameterized schemes and for interpreting observations.
  tags: []
- category: Climate Modeling
  title: Near-surface Extreme Wind Events and Their Responses to Climate Forcings
    in a Hierarchy of Global Climate Models
  authors: G. Zhang, M. Rao, I. Simpson, K. A. Reed, B. Medeiros, H. -H. Chou, T.
    Shaw
  year: 2026
  arxiv: 2603.03483v1
  abstract: Near-surface extreme winds profoundly affect human society, yet process-based
    understanding of their changes under climate forcings remains limited. This study
    systematically investigates the responses of high (HWE) and low (LWE) wind extremes
    (10-meter) to climate forcings using a hierarchy of climate model experiments
    from multiple general circulation models that participated in the Cloud Feedback
    Model Intercomparison Project. We analyze idealized atmosphere-only aquaplanet
    (Aqua) simulations and more realistic land-atmosphere (AMIP) simulations to identify
    robust responses to climate forcings and trace the sources of structural uncertainty.
    In Aqua simulations, tropical LWE changes exhibit large inter-model spread, which
    can be traced to dynamically distinct representations of low-pressure systems
    between models. In contrast, extratropical HWE intensify robustly with surface
    warming, linked to the strengthening of high-latitude extratropical cyclones.
    The AMIP simulations confirm the robust intensification of extratropical HWE.
    The more realistic boundary conditions in AMIP simulations act as a constraint,
    reducing inter-model spread in tropical zonal means compared to Aqua simulations.
    A comparison of uniform and patterned 4-K warming experiments suggests that the
    global magnitude of warming, rather than the specific warming pattern, dominates
    the large-scale responses of wind extremes. However, regional projections of extreme
    wind changes, especially over land, remain highly uncertain due to divergences
    in model physics. Case studies reveal that major disagreements in HWE changes
    can stem from fundamental differences in representing the type and seasonality
    of extreme-producing weather systems. Our results underscore that reducing uncertainty
    in regional wind projections requires constraining the physical representation
    of weather systems in climate models.
  tags: []
- category: Nowcasting
  title: 'MAD-SmaAt-GNet: A Multimodal Advection-Guided Neural Network for Precipitation
    Nowcasting'
  authors: Samuel van Wonderen, Siamak Mehrkanoon
  year: 2026
  arxiv: 2603.04461v1
  abstract: Precipitation nowcasting (short-term forecasting) is still often performed
    using numerical solvers for physical equations, which are computationally expensive
    and make limited use of the large volumes of available weather data. Deep learning
    models have shown strong potential for precipitation nowcasting, offering both
    accuracy and computational efficiency. Among these models, convolutional neural
    networks (CNNs) are particularly effective for image-to-image prediction tasks.
    The SmaAt-UNet is a lightweight CNN based architecture that has demonstrated strong
    performance for precipitation nowcasting. This paper introduces the Multimodal
    Advection-Guided Small Attention GNet (MAD-SmaAt-GNet), which extends the core
    SmaAt-UNet by (i) incorporating an additional encoder to learn from multiple weather
    variables and (ii) integrating a physics-based advection component to ensure physically
    consistent predictions. We show that each extension individually improves rainfall
    forecasts and that their combination yields further gains. MAD-SmaAt-GNet reduces
    the mean squared error (MSE) by 8.9% compared with the baseline SmaAt-UNet for
    four-step precipitation forecasting up to four hours ahead. Additionally, experiments
    indicate that multimodal inputs are particularly beneficial for short lead times,
    while the advection-based component enhances performance across both short and
    long forecasting horizons.
  tags:
  - CNN
  - physics-informed
- category: Data Assimilation
  title: Convergence Analysis of a Fully Discrete Observer For Data Assimilation of
    the Barotropic Euler Equations
  authors: Aidan Chaumet, Jan Giesselmann
  year: 2026
  arxiv: 2603.10962v2
  abstract: 'We study the convergence of a discrete Luenberger observer for the barotropic
    Euler equations in one dimension, for measurements of the velocity only. We use
    a mixed finite element method in space and implicit Euler integration in time.
    We use a modified relative energy technique to show an error bound comparing the
    discrete observer to the original system''s solution. The bound is the sum of
    three parts: an exponentially decaying part, proportional to the difference in
    initial value, a part proportional to the grid sizes in space and time and a part
    that is proportional to the size of the measurement errors as well as the nudging
    parameter. The proportionality constants of the second and third parts are independent
    of time and grid sizes. To the best of our knowledge, this provides the first
    error estimate for a discrete observer for a quasilinear hyperbolic system, and
    implies uniform-in-time accuracy of the discrete observer for long-time simulations.'
  tags: []
- category: Other
  title: Splitting horizontal and vertical polynomial order in a compatible finite
    element discretisation for numerical weather prediction
  authors: Daniel Witt, Thomas Bendall, Jemma Shipton
  year: 2026
  arxiv: 2603.16571v1
  abstract: The accurate and efficient representation of atmospheric dynamics remains
    a central challenge in numerical weather prediction. A particular difficulty arises
    from the strong anisotropy of the atmosphere, in which horizontal and vertical
    motions occur on very different length scales, motivating numerical discretisations
    that can reflect this structure. In this study, we introduce a compatible finite
    element discretisation of the compressible Boussinesq and compressible Euler equations
    in which the horizontal and vertical polynomial orders are treated independently.   The
    split-order discretisation is constructed using a tensor-product framework that
    preserves the discrete de Rham complex and associated mimetic properties. Its
    wave-propagation characteristics are examined through a discrete dispersion analysis
    that extends previous analyses to configurations with differing horizontal and
    vertical polynomial orders. The results show that increasing horizontal order
    improves the representation of gravity waves at low and intermediate wavenumbers,
    while increasing vertical order can degrade dispersion accuracy near the grid
    scale and introduce spectral gaps.   A series of idealised numerical experiments,
    including gravity-wave propagation, advective transport, mountain-wave flow, and
    a global baroclinic-wave test, is used to assess the scheme's accuracy and convergence
    properties. These experiments demonstrate that increasing the polynomial order
    in the dominant direction of motion improves convergence, and that increasing
    the horizontal order yields the greatest gain in accuracy under typical atmospheric
    conditions. The results indicate that split-order compatible finite element discretisations
    provide a viable alternative for controlling accuracy and numerical behaviour
    in atmospheric dynamical cores.
  tags: []
- category: Global Models
  title: 'FuXiWeather2: Learning accurate atmospheric state estimation for operational
    global weather forecasting'
  authors: Xiaoze Xu, Xiuyu Sun, Songling Zhu, Xiaohui Zhong, Yuanqing Huang, Zijian
    Zhu, Jun Liu, Hao Li
  year: 2026
  arxiv: 2603.15358v1
  abstract: Numerical weather prediction has long been constrained by the computational
    bottlenecks inherent in data assimilation and numerical modeling. While machine
    learning has accelerated forecasting, existing models largely serve as "emulators
    of reanalysis products," thereby retaining their systematic biases and operational
    latencies. Here, we present FuXiWeather2, a unified end-to-end neural framework
    for assimilation and forecasting. We align training objectives directly with a
    combination of real-world observations and reanalysis data, enabling the framework
    to effectively rectify inherent errors within reanalysis products. To address
    the distribution shift between NWP-derived background inputs during training and
    self-generated backgrounds during deployment, we introduce a recursive unrolling
    training method to enhance the precision and stability of analysis generation.
    Furthermore, our model is trained on a hybrid dataset of raw and simulated observations
    to mitigate the impact of observational distribution inconsistency. FuXiWeather2
    generates high-resolution ($0.25^{\circ}$) global analysis fields and 10-day forecasts
    within minutes. The analysis fields surpass the NCEP-GFS across most variables
    and demonstrate superior accuracy over both ERA5 and the ECMWF-HRES system in
    lower-tropospheric and surface variables. These high-quality analysis fields drive
    deterministic forecasts that exceed the skill of the HRES system in 91\% of evaluated
    metrics. Additionally, its outstanding performance in typhoon track prediction
    underscores its practical value for rapid response to extreme weather events.
    The FuXiWeather2 analysis dataset is available at https://doi.org/10.5281/zenodo.18872728.
  tags: []
- category: Global Models
  title: 'AGCD: Agent-Guided Cross-Modal Decoding for Weather Forecasting'
  authors: Jing Wu, Yang Liu, Lin Zhang, Junbo Zeng, Jiabin Wang, Zi Ye, Guowen Li,
    Shilei Cao, Jiashun Cheng, Fang Wang, Meng Jin, Yerong Feng, Hong Cheng, Yutong
    Lu, Haohuan Fu, Juepeng Zheng
  year: 2026
  arxiv: 2603.15260v1
  abstract: 'Accurate weather forecasting is more than grid-wise regression: it must
    preserve coherent synoptic structures and physical consistency of meteorological
    fields, especially under autoregressive rollouts where small one-step errors can
    amplify into structural bias. Existing physics-priors approaches typically impose
    global, once-for-all constraints via architectures, regularization, or NWP coupling,
    offering limited state-adaptive and sample-specific controllability at deployment.
    To bridge this gap, we propose Agent-Guided Cross-modal Decoding (AGCD), a plug-and-play
    decoding-time prior-injection paradigm that derives state-conditioned physics-priors
    from the current multivariate atmosphere and injects them into forecasters in
    a controllable and reusable way. Specifically, We design a multi-agent meteorological
    narration pipeline to generate state-conditioned physics-priors, utilizing MLLMs
    to extract various meteorological elements effectively. To effectively apply the
    priors, AGCD further introduce cross-modal region interaction decoding that performs
    region-aware multi-scale tokenization and efficient physics-priors injection to
    refine visual features without changing the backbone interface. Experiments on
    WeatherBench demonstrate consistent gains for 6-hour forecasting across two resolutions
    (5.625 degree and 1.40625 degree) and diverse backbones (generic and weather-specialized),
    including strictly causal 48-hour autoregressive rollouts that reduce early-stage
    error accumulation and improve long-horizon stability.'
  tags: []
- category: Global Models
  title: Super-Resolving Coarse-Resolution Weather Forecasts With Flow Matching
  authors: Aymeric Delefosse, Anastase Charantonis, Dominique Béréziat
  year: 2026
  arxiv: 2604.00897v1
  abstract: Machine learning-based weather forecasting models now surpass state-of-the-art
    numerical weather prediction systems, but training and operating these models
    at high spatial resolution remains computationally expensive. We present a modular
    framework that decouples forecasting from spatial resolution by applying learned
    generative super-resolution as a post-processing step to coarse-resolution forecast
    trajectories. We formulate super-resolution as a stochastic inverse problem, using
    a residual formulation to preserve large-scale structure while reconstructing
    unresolved variability. The model is trained with flow matching exclusively on
    reanalysis data and is applied to global medium-range forecasts. We evaluate (i)
    design consistency by re-coarsening super-resolved forecasts and comparing them
    to the original coarse trajectories, and (ii) high-resolution forecast quality
    using standard ensemble verification metrics and spectral diagnostics. Results
    show that super-resolution preserves large-scale structure and variance after
    re-coarsening, introduces physically consistent small-scale variability, and achieves
    competitive probabilistic forecast skill at 0.25° resolution relative to an operational
    ensemble baseline, while requiring only a modest additional training cost compared
    with end-to-end high-resolution forecasting.
  tags:
  - diffusion
  - probabilistic
- category: Data Assimilation
  title: Deep-Learned Observation Operators for Artificial Intelligence Weather Forecasting
    Models
  authors: Kelsey Lieberman, Laura Slivinski, Matt Bender, Chris Miller, Josh DaRosa,
    Nick Krall, Mohammad Ridhwaan Alam, Nick Silverman, Sergey Frolov
  year: 2026
  arxiv: 2604.00082v1
  abstract: Satellite observation operators play an essential role in atmospheric
    data assimilation by translating model state variables into observation space.
    Previous work has shown that deep-learned emulators can effectively predict the
    outputs of classic observation operators, like the Community Radiative Transfer
    Model (CRTM), with reduced inference time. This study expands previous work to
    show the potential for integrating observation operators into artificial intelligence
    (AI) weather forecasting models. Specifically, this study shows that (1) deep-learned
    models can effectively predict the innovations (or differences between the simulated
    and observed radiances) used by data assimilation models and (2) deep-learned
    observation models suffer only minor degradations in performance when the model
    state is represented with fewer vertical levels, as is commonly used by AI forecasting
    models. Experiments were performed using the Unified Forecast System (UFS) replay
    dataset, including Gridpoint Statistical Interpolation (GSI) observational data
    for the Advanced Technology Microwave Sounder (ATMS) sensor from 2022 and 2023.
    Code is available at https://github.com/mitre/deep-obs.
  tags: []
  github: https://github.com/mitre/deep-obs
- category: Downscaling
  title: 30-meter Land Surface Temperature from Landsat via Progressive Self-Training
    Downscaling
  authors: Huanfeng Shen, Chan Li, Menghui Jiang, Penghai Wu, Guanhao Zhang, Tian
    Xie
  year: 2026
  arxiv: 2603.29478v1
  abstract: Land surface temperature (LST) is a critical parameter for characterizing
    surface energy balance and hydrothermal processes. While Landsat provides invaluable
    LST observations at medium spatial resolution for over 40 years, its native spatial
    resolution of thermal bands (e.g., 100 m) remains insufficient compared to its
    30 m optical bands, failing to meet the demands of fine-scale studies. To address
    this issues, this study proposes a progressive self-training framework for downscaling
    Landsat LST to 30 m without relying on fine-scale ground truth, while maintaining
    minimal data dependence. The framework progressively optimizes a cross-modal fusion
    network to refine thermal details in a coarse-to-fine manner, characterized by
    one pre-training and two fine-tuning stages. Spatial validation against SDGSAT-1
    30 m LST and temporal validation using in situ measurements confirm its reliability
    and accuracy, with both station-averaged MAE and RMSE outperforming the official
    cubic product by approximately 0.4 K. Further performance comparison experiments
    demonstrate that the proposed framework consistently reconstructs coherent fine-scale
    thermal patterns while preserving spatial heterogeneity. Multi spatial resolution
    evaluations and ablation studies verify the effectiveness of the proposed strategy
    and network design. Overall, the framework provides a stable pathway for enhancing
    the spatial resolution of Landsat LST, providing fine-resolution data support
    for fine-scale surface process studies and localized environmental monitoring.
  tags: []
- category: Global Models
  title: Improving Ensemble Forecasts of Abnormally Deflecting Tropical Cyclones with
    Fused Atmosphere-Ocean-Terrain Data
  authors: Qixiang Li, Yuan Zhou, Shuwei Huo, Chong Wang, Xiaofeng Li
  year: 2026
  arxiv: 2603.29200v2
  abstract: 'Deep learning-based tropical cyclone (TC) forecasting methods have demonstrated
    significant potential and application advantages, as they feature much lower computational
    cost and faster operation speed than numerical weather prediction models. However,
    existing deep learning methods still have key limitations: they can only process
    a single type of sequential trajectory data or homogeneous meteorological variables,
    and fail to achieve accurate forecasting of abnormal deflected TCs. To address
    these challenges, we present two groundbreaking contributions. First, we have
    constructed a multimodal and multi-source dataset named AOT-TCs for TC forecasting
    in the Northwest Pacific basin. As the first dataset of its kind, it innovatively
    integrates heterogeneous variables from the atmosphere, ocean, and land, thus
    obtaining a comprehensive and information-rich meteorological dataset. Second,
    based on the AOT-TCs dataset, we propose a forecasting model that can handle both
    normal and abnormally deflected TCs. This is the first TC forecasting model to
    adopt an explicit atmosphere-ocean-terrain coupling architecture, enabling it
    to effectively capture complex interactions across physical domains. Extensive
    experiments on all TC cases in the Northwest Pacific from 2017 to 2024 show that
    our model achieves state-of-the-art performance in TC forecasting: it not only
    significantly improves the forecasting accuracy of normal TCs but also breaks
    through the technical bottleneck in forecasting abnormally deflected TCs.'
  tags: []
- category: Global Models
  title: Skillful Kilometer-Scale Regional Weather Forecasting via Global and Regional
    Coupling
  authors: Weiqi Chen, Wenwei Wang, Qilong Yuan, Lefei Shen, Bingqing Peng, Jiawei
    Chen, Bo Wu, Liang Sun
  year: 2026
  arxiv: 2603.28173v1
  abstract: Data-driven weather models have advanced global medium-range forecasting,
    yet high-resolution regional prediction remains challenging due to unresolved
    multiscale interactions between large-scale dynamics and small-scale processes
    such as terrain-induced circulations and coastal effects. This paper presents
    a global-regional coupling framework for kilometer-scale regional weather forecasting
    that synergistically couples a pretrained Transformer-based global model with
    a high-resolution regional network via a novel bidirectional coupling module,
    ScaleMixer. ScaleMixer dynamically identifies meteorologically critical regions
    through adaptive key-position sampling and enables cross-scale feature interaction
    through dedicated attention mechanisms. The framework produces forecasts at $0.05^\circ$
    ($\sim 5 \mathrm{km}$ ) and 1-hour resolution over China, significantly outperforming
    operational NWP and AI baselines on both gridded reanalysis data and real-time
    weather station observations. It exhibits exceptional skill in capturing fine-grained
    phenomena such as orographic wind patterns and Foehn warming, demonstrating effective
    global-scale coherence with high-resolution fidelity. The code is available at
    https://anonymous.4open.science/r/ScaleMixer-6B66.
  tags:
  - transformer
- category: Data Assimilation
  title: Self-Organizing Score-based Data Assimilation
  authors: Yuma Yamaoka, Seiichi Uchida, Shoji Toyota
  year: 2026
  arxiv: 2603.28048v2
  abstract: A state-space model is a statistical framework for inferring latent states
    from observed time-series data. However, inference with nonlinear and high-dimensional
    state-space models remains challenging. To this end, an approach based on diffusion
    models-a powerful class of deep generative models-has been developed, known as
    Score-based Data Assimilation (SDA). However, SDA cannot be directly applied when
    the latent-state transition depends on unknown parameters that must be inferred
    jointly with the latent states. To overcome this limitation, we propose a framework
    that enables SDA to handle latent states with unknown parameters. A key feature
    of the proposed method is the incorporation of the self-organization technique,
    which has been used in classical state-space modeling for the joint estimation
    of latent states and parameters. By integrating this classical technique into
    modern SDA, our method enables joint inference of latent states and unknown parameters
    while maintaining the high training efficiency of SDA. The effectiveness of the
    proposed approach is validated through numerical experiments on dynamical systems
    arising in neuroscience and atmospheric science. In addition, its scalability
    is demonstrated using a high-dimensional Kolmogorov flow, with the data dimension
    on the order of several hundred thousand.
  tags:
  - diffusion
- category: Downscaling
  title: Generative 3D Gaussian Splatting for Arbitrary-ResolutionAtmospheric Downscaling
    and Forecasting
  authors: Tao Hana, Zhibin Wen, Zhenghao Chen, Fenghua Lin, Junyu Gao, Song Guo,
    Lei Bai
  year: 2026
  arxiv: 2604.07928v1
  abstract: 'While AI-based numerical weather prediction (NWP) enables rapid forecasting,
    generating high-resolution outputs remains computationally demanding due to limited
    multi-scale adaptability and inefficient data representations. We propose the
    3D Gaussian splatting-based scale-aware vision transformer (GSSA-ViT), a novel
    framework for arbitrary-resolution forecasting and flexible downscaling of high-dimensional
    atmospheric fields. Specifically, latitude-longitude grid points are treated as
    centers of 3D Gaussians. A generative 3D Gaussian prediction scheme is introduced
    to estimate key parameters, including covariance, attributes, and opacity, for
    unseen samples, improving generalization and mitigating overfitting. In addition,
    a scale-aware attention module is designed to capture cross-scale dependencies,
    enabling the model to effectively integrate information across varying downscaling
    ratios and support continuous resolution adaptation. To our knowledge, this is
    the first NWP approach that combines generative 3D Gaussian modeling with scale-aware
    attention for unified multi-scale prediction. Experiments on ERA5 show that the
    proposed method accurately forecasts 87 atmospheric variables at arbitrary resolutions,
    while evaluations on ERA5 and CMIP6 demonstrate its superior performance in downscaling
    tasks. The proposed framework provides an efficient and scalable solution for
    high-resolution, multi-scale atmospheric prediction and downscaling. Code is available
    at: https://github.com/binbin2xs/weather-GS.'
  tags:
  - transformer
  github: https://github.com/binbin2xs/weather-GS
- category: Global Models
  title: El Nino Prediction Based on Weather Forecast and Geographical Time-series
    Data
  authors: Viet Trinh, Ha-Vy Luu, Quoc-Khiem Nguyen-Pham, Hung Tong, Thanh-Huyen Tran,
    Hoai-Nam Nguyen Dang
  year: 2026
  arxiv: 2604.04998v1
  abstract: This paper proposes a novel framework for enhancing the prediction accuracy
    and lead time of El Niño events, crucial for mitigating their global climatic,
    economic, and societal impacts. Traditional prediction models often rely on oceanic
    and atmospheric indices, which may lack the granularity or dynamic interplay captured
    by comprehensive meteorological and geographical datasets. Our framework integrates
    real-time global weather forecast data with anomalies, subsurface ocean heat content,
    and atmospheric pressure across various temporal and spatial resolutions. Leveraging
    a hybrid deep learning architecture that combines a Convolutional Neural Network
    (CNN) for spatial feature extraction and a Long Short-Term Memory (LSTM) network
    for temporal dependency modeling, the framework aims to identify complex precursors
    and evolving patterns of El Niño events.
  tags:
  - CNN
  - recurrent
- category: Climate Modeling
  title: Capturing Aleatoric Uncertainty in Climate Models
  authors: Cornelia Gruber, Henri Funk, Magdalena Mittermeier, Helmut Küchenhoff,
    Göran Kauermann
  year: 2026
  arxiv: 2604.15067v1
  abstract: Internal climate variability arises from the climate system's inherently
    chaotic dynamics. Quantifying it is essential for climate science, as it enables
    risk-based decision-making and differentiates between externally forced change
    and internal fluctuations. In statistical terms, natural variability corresponds
    to aleatoric uncertainty, i.e., irreducible stochastic variability. Despite this
    close conceptual alignment, the link between internal climate variability and
    aleatoric uncertainty has not yet been formalized. We establish a theoretical
    link by showing that member-to-member differences in single-model large ensembles
    provide a direct representation of aleatoric uncertainty. To quantify the spatio-temporal
    structure of aleatoric uncertainty, we employ generalized additive models. The
    proposed framework is validated through comparison with ERA5-Land reanalysis data,
    demonstrating that ensemble-derived estimates reproduce key spatial and temporal
    patterns of real-world variability. Applied to the water balance over the Iberian
    Peninsula, our approach reveals coherent variability structures and pronounced
    regional heterogeneity. We find a decline in variability in drought-prone regions
    and seasons, a pattern that strengthens under +3 °C global warming, implying an
    increased risk of persistent summer drought conditions. Beyond this application,
    the framework is climate-model agnostic and transferable to other variables and
    spatial scales, providing a statistical basis for quantifying internal climate
    variability as aleatoric uncertainty.
  tags: []
- category: Ensembles
  title: 'SwinVRNN: A Data-Driven Ensemble Forecasting Model via Learned Distribution
    Perturbation'
  authors: Yuan Hu, Lei Chen, Zhibin Wang, Hao Li
  year: 2022
  arxiv: 2205.13158v1
  abstract: Data-driven approaches for medium-range weather forecasting are recently
    shown extraordinarily promising for ensemble forecasting for their fast inference
    speed compared to traditional numerical weather prediction (NWP) models, but their
    forecast accuracy can hardly match the state-of-the-art operational ECMWF Integrated
    Forecasting System (IFS) model. Previous data-driven attempts achieve ensemble
    forecast using some simple perturbation methods, like initial condition perturbation
    and Monte Carlo dropout. However, they mostly suffer unsatisfactory ensemble performance,
    which is arguably attributed to the sub-optimal ways of applying perturbation.
    We propose a Swin Transformer-based Variational Recurrent Neural Network (SwinVRNN),
    which is a stochastic weather forecasting model combining a SwinRNN predictor
    with a perturbation module. SwinRNN is designed as a Swin Transformer-based recurrent
    neural network, which predicts future states deterministically. Furthermore, to
    model the stochasticity in prediction, we design a perturbation module following
    the Variational Auto-Encoder paradigm to learn multivariate Gaussian distributions
    of a time-variant stochastic latent variable from data. Ensemble forecasting can
    be easily achieved by perturbing the model features leveraging noise sampled from
    the learned distribution. We also compare four categories of perturbation methods
    for ensemble forecasting, i.e. fixed distribution perturbation, learned distribution
    perturbation, MC dropout, and multi model ensemble. Comparisons on WeatherBench
    dataset show the learned distribution perturbation method using our SwinVRNN model
    achieves superior forecast accuracy and reasonable ensemble spread due to joint
    optimization of the two targets. More notably, SwinVRNN surpasses operational
    IFS on surface variables of 2-m temperature and 6-hourly total precipitation at
    all lead times up to five days.
  tags:
  - transformer
  - recurrent
  - cs.CV
  arxiv_categories:
  - cs.CV
- category: Downscaling
  title: 'MambaDS: Near-Surface Meteorological Field Downscaling with Topography Constrained
    Selective State Space Modeling'
  authors: Zili Liu, Hao Chen, Lei Bai, Wenyuan Li, Wanli Ouyang, Zhengxia Zou, Zhenwei
    Shi
  year: 2024
  arxiv: 2408.10854v1
  abstract: In an era of frequent extreme weather and global warming, obtaining precise,
    fine-grained near-surface weather forecasts is increasingly essential for human
    activities. Downscaling (DS), a crucial task in meteorological forecasting, enables
    the reconstruction of high-resolution meteorological states for target regions
    from global-scale forecast results. Previous downscaling methods, inspired by
    CNN and Transformer-based super-resolution models, lacked tailored designs for
    meteorology and encountered structural limitations. Notably, they failed to efficiently
    integrate topography, a crucial prior in the downscaling process. In this paper,
    we address these limitations by pioneering the selective state space model into
    the meteorological field downscaling and propose a novel model called MambaDS.
    This model enhances the utilization of multivariable correlations and topography
    information, unique challenges in the downscaling process while retaining the
    advantages of Mamba in long-range dependency modeling and linear computational
    complexity. Through extensive experiments in both China mainland and the continental
    United States (CONUS), we validated that our proposed MambaDS achieves state-of-the-art
    results in three different types of meteorological field downscaling settings.
    We will release the code subsequently.
  tags:
  - transformer
  - CNN
  - physics.ao-ph
  - cs.AI
  - cs.CV
  arxiv_categories:
